enabled: true

cursor:
  enabled: true
  model: composer-2.5
  draft_pr: true
  max_log_chars: 45000
  max_agent_attempts_per_sha: 1
  minimum_repeat_count: 2
  maximum_failed_jobs: 2
  skip_fork_prs: true
  skip_workflows:
    - CI Autofix

github:
  create_issue_for_notify_only: false
  issue_labels:
    - ci-autofix
    - needs-attention
  pr_labels:
    - ci-autofix
    - agent-generated
    - needs-human-review

slack:
  enabled: true
  mention: ""

classify:
  notify_only:
    - platform
    - credentials
    - permissions
    - human_required
  transient_retry_first: true
  default_action: notify_only

repo_notes: |
  This repo publishes the dashboard from docs/ on main. If dashboard/ changes are
  relevant to a fix, mirror them into docs/ before opening a PR.
