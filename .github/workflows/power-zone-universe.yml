name: Power Zone Universe

on:
  schedule:
    - cron: "30 5 * * 1"
  workflow_run:
    workflows: [Data Pipeline]
    types: [completed]
    branches: [main]
  repository_dispatch:
    types: [refresh-power-zones]

permissions:
  contents: write
  actions: read

concurrency:
  group: power-zone-universe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      downloads_ready: ${{ steps.check.outputs.downloads_ready }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name=="downloads") | .conclusion' 2>/dev/null || true)
          if echo "$JOBS" | grep -qx success; then
            echo "downloads_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "downloads_ready=false" >> "$GITHUB_OUTPUT"
          fi

  route-value-gate:
    needs: gate
    if: always() && (github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && needs.gate.outputs.downloads_ready == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/actions/**
            /.github/workflows/**
            /_system/**
            /dashboard/**
            /docs/**
            /*/research/**

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate cutover pipeline
        working-directory: _system/scripts
        run: |
          python -m pip install --disable-pip-version-check -r requirements-governance.txt
          python -m unittest \
            test_generalized_valuation_system \
            test_investment_committee_pipeline \
            test_valuation_workbench \
            test_power_zone_pricing \
            test_decision_authority \
            test_security_decision_pipeline \
            test_human_decision \
            test_valuation_authority_cutover \
            test_llm_call_gate \
            test_agent_evidence_gates \
            test_committee_task_queue \
            test_llm_workflow_governance

      - name: Process canonical universe
        run: |
          python _system/scripts/run_security_decision_pipeline.py --scope all --skip-dashboard
          python _system/scripts/refresh_valuation_dashboard_rows.py
          python _system/scripts/validate_dashboard_data.py

      - name: Commit authority artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- '*/research/valuation_route.json' \
                         '*/research/valuation_contract.json' \
                         '*/research/valuation_workbench.json' \
                         '*/research/pricing_analysis.json' \
                         '_system/reviews/pending/power_zone_universe_run_*.json' \
                         dashboard/data/power_zones.json \
                         dashboard/data/dashboard_data.json \
                         docs/data/dashboard_data.json
          while IFS= read -r -d '' path; do
            git add -A -- "$path"
          done < <(find . -mindepth 3 -maxdepth 3 -type d -path './*/research/committee_work' -print0)
          if git diff --cached --quiet; then
            echo "No authority artifacts changed."
            exit 0
          fi
          git commit -m "chore(valuation): process Power Zone universe"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Power Zone universe processing completed for all companies."
          gh api --method POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=advance-investment-committee
