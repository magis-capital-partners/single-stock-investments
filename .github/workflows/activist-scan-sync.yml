name: Activist Scan Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional ticker (repeat workflow for multiple)"
        required: false
        type: string
      sec_only:
        description: "SEC 13D scan only"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  activist-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Run activist scan
        env:
          TICKER: ${{ github.event.inputs.ticker || '' }}
          SEC_ONLY: ${{ github.event.inputs.sec_only || 'false' }}
        run: |
          ARGS=""
          if [ -n "$TICKER" ]; then ARGS="$ARGS --ticker $TICKER"; fi
          if [ "$SEC_ONLY" = "true" ]; then ARGS="$ARGS --sec-only"; fi
          python _system/scripts/scan_activist_sources.py $ARGS
          python _system/scripts/short_scan_batch.py

      - name: Rebuild document registry and dashboard
        uses: ./.github/actions/rebuild-data
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
        with:
          profile: activist
          mirror_docs: "true"

      - name: Commit activist scan artifacts
        uses: ./.github/actions/commit-main
        with:
          message: "chore: activist scan sync $(date -u +%Y-%m-%d)"

      - name: Pipeline summary
        run: echo "Activist Scan Sync complete. Deploy Dashboard chains via workflow_run."
