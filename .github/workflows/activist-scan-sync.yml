name: Activist Scan Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional ticker (repeat workflow for multiple)"
        required: false
        type: string
      sec_only:
        description: "SEC 13D scan only"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  activist-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (full — imports PDFs)
        run: bash _system/scripts/ci_checkout_workspace.sh full

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Run activist scan
        env:
          TICKER: ${{ github.event.inputs.ticker || '' }}
          SEC_ONLY: ${{ github.event.inputs.sec_only || 'false' }}
        run: |
          ARGS="--reconcile"
          if [ -n "$TICKER" ]; then ARGS="$ARGS --ticker $TICKER"; fi
          if [ "$SEC_ONLY" = "true" ]; then ARGS="$ARGS --sec-only"; fi
          python _system/scripts/scan_activist_sources.py $ARGS
          python _system/scripts/short_scan_batch.py

      - name: Rebuild document registry and dashboard
        uses: ./.github/actions/rebuild-data
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
        with:
          profile: activist
          mirror_docs: "true"

      - name: Commit activist scan artifacts
        uses: ./.github/actions/commit-main
        with:
          message: "chore: activist scan sync $(date -u +%Y-%m-%d)"

      - name: Pipeline summary
        run: echo "Activist Scan Sync complete. Deploy Dashboard chains via workflow_run."
