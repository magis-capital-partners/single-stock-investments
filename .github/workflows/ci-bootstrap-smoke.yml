name: CI bootstrap smoke

on:
  pull_request:
    branches: [main]
    paths:
      - "_system/scripts/ci_checkout_workspace.sh"
      - "_system/scripts/ci_resolve_checkout_ref.sh"
      - "_system/scripts/ci_sparse_checkout_paths.py"
      - "_system/scripts/ci_rebuild_profile.py"
      - "_system/scripts/test_pages_fast_rebuild_steps.py"
      - "_system/scripts/ci_checkout_vault.sh"
      - "_system/scripts/ci_checkout_vault_lib.sh"
      - "_system/scripts/ci_push_vault.sh"
      - "_system/scripts/vault_paths.py"
      - "_system/scripts/test_ci_checkout_workspace.sh"
      - "_system/scripts/test_ci_checkout_vault.sh"
      - "_system/scripts/test_vault_paths.py"
      - "_system/scripts/lint_ci_bootstrap.py"
      - "_system/scripts/letter_date_parser.py"
      - "_system/scripts/calibrate_letter_dates.py"
      - "_system/scripts/test_letter_date_parser.py"
      - "_system/scripts/test_fund_registry_date.py"
      - "_system/scripts/fund_identity.py"
      - "_system/scripts/test_fund_identity.py"
      - "_system/scripts/test_ci_push_rebase_resolve.sh"
      - "_system/scripts/test_ci_push_empty_rebase.sh"
      - "_system/scripts/test_validate_dashboard_sparse.py"
      - "_system/scripts/ci_push_main.sh"
      - "_system/scripts/_eval/letter_date_gold.jsonl"
      - "_system/reference/letter_date_overrides.json"
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches: [main]
    paths:
      - "_system/scripts/ci_checkout_workspace.sh"
      - "_system/scripts/ci_resolve_checkout_ref.sh"
      - "_system/scripts/ci_sparse_checkout_paths.py"
      - "_system/scripts/ci_rebuild_profile.py"
      - "_system/scripts/test_pages_fast_rebuild_steps.py"
      - "_system/scripts/ci_checkout_vault.sh"
      - "_system/scripts/ci_checkout_vault_lib.sh"
      - "_system/scripts/ci_push_vault.sh"
      - "_system/scripts/vault_paths.py"
      - "_system/scripts/test_ci_checkout_workspace.sh"
      - "_system/scripts/test_ci_checkout_vault.sh"
      - "_system/scripts/test_vault_paths.py"
      - "_system/scripts/lint_ci_bootstrap.py"
      - "_system/scripts/letter_date_parser.py"
      - "_system/scripts/calibrate_letter_dates.py"
      - "_system/scripts/test_letter_date_parser.py"
      - "_system/scripts/test_fund_registry_date.py"
      - "_system/scripts/fund_identity.py"
      - "_system/scripts/test_fund_identity.py"
      - "_system/scripts/test_ci_push_rebase_resolve.sh"
      - "_system/scripts/test_ci_push_empty_rebase.sh"
      - "_system/scripts/test_validate_dashboard_sparse.py"
      - "_system/scripts/ci_push_main.sh"
      - "_system/scripts/_eval/letter_date_gold.jsonl"
      - "_system/reference/letter_date_overrides.json"
      - ".github/workflows/**"
      - ".github/actions/**"

permissions:
  contents: read

jobs:
  ref-resolution:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_checkout_vault.sh
            _system/scripts/ci_checkout_vault_lib.sh
            _system/scripts/ci_push_vault.sh
            _system/scripts/vault_paths.py
            _system/scripts/test_ci_checkout_workspace.sh
            _system/scripts/test_ci_checkout_vault.sh
            _system/scripts/test_vault_paths.py
            _system/scripts/lint_ci_bootstrap.py
            _system/scripts/ci_sparse_checkout_paths.py
            _system/scripts/ci_rebuild_profile.py
            _system/scripts/test_pages_fast_rebuild_steps.py
            .github/workflows
            .github/actions
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Unit test ref resolution
        run: bash _system/scripts/test_ci_checkout_workspace.sh
      - name: Unit test vault checkout helpers
        run: bash _system/scripts/test_ci_checkout_vault.sh
      - name: Unit test vault paths
        run: python _system/scripts/test_vault_paths.py
      - name: Lint workflow bootstrap blocks
        run: python _system/scripts/lint_ci_bootstrap.py
      - name: Guard darwin sparse path count
        run: |
          COUNT=$(python _system/scripts/ci_sparse_checkout_paths.py --count darwin)
          echo "darwin sparse extra paths=$COUNT"
          test "$COUNT" -le 200
      - name: Guard rebuild profiles
        run: python _system/scripts/test_pages_fast_rebuild_steps.py

  ci-push-rebase:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /.github/**
            /_system/**
            /dashboard/**
            /docs/**
            /*/research/**
      - name: Fetch main for rebase smoke tests
        run: git fetch origin main --depth=50
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: CI push rebase conflict resolver smoke tests
        env:
          CI_PUSH_SKIP_SELF_REFRESH: "1"
          CI_PUSH_SMOKE_FAST: "1"
        run: |
          bash _system/scripts/test_ci_push_empty_rebase.sh
          bash _system/scripts/test_ci_push_multi_rebase.sh
          bash _system/scripts/test_ci_push_rebase_resolve.sh

  letter-date-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /Makefile
            /_system/scripts/**
            /_system/reference/letter_date_overrides.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Letter date parser gold gate
        run: make letter-date-check

  checkout-minimal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - name: Assert checkout ref is fetchable
        run: |
          set -euo pipefail
          REF=$(bash _system/scripts/ci_resolve_checkout_ref.sh)
          echo "Resolved ref: $REF"
          git rev-parse HEAD
          test -f _system/scripts/ci_checkout_workspace.sh
          test -d .github/workflows
