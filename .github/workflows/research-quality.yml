name: Research quality (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "**/research/**"
      - "_system/scripts/ci_checkout_workspace.sh"
      - "_system/scripts/ci_resolve_checkout_ref.sh"
      - "_system/scripts/ci_sparse_checkout_paths.py"
      - "_system/scripts/lint_deep_dive.py"
      - "_system/scripts/lint_adversarial.py"
      - "_system/scripts/lint_pr_research.py"
      - "_system/scripts/check_evidence_completeness.py"
      - "_system/scripts/refresh_optionality_valuation.py"
      - "_system/scripts/filing_facts.py"
      - "_system/prompts/cloud_marvin_runbook.md"
      - "_system/scripts/marvin_deep_dive.mjs"
      - "_system/scripts/marvin_cloud_refresh.py"
      - "_system/scripts/batch_portfolio_refresh.py"
      - "_system/scripts/check_cloud_marvin_sync.py"

permissions:
  contents: read

jobs:
  cloud-prompt-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify cloud Marvin prompt sync
        run: python _system/scripts/check_cloud_marvin_sync.py

  research-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (full history for PR diff)
        run: bash _system/scripts/ci_checkout_workspace.sh history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Lint changed ticker research
        run: python _system/scripts/lint_pr_research.py --base origin/${{ github.base_ref }}
