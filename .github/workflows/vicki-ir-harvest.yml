name: Vicki IR Harvest

# Browser IR harvest for tickers where Marvin curl/urllib failed (ir_gap).
# Trigger: push updated queue to main, or manual workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Optional comma-separated tickers (empty = queue file)"
        required: false
        type: string
      max_parallel:
        description: "Max concurrent Vicki jobs"
        required: false
        default: "2"
        type: string
  push:
    branches: [main]
    paths:
      - _system/data/vicki_dispatch_queue.json

permissions:
  contents: read

concurrency:
  group: vicki-ir-harvest
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tickers: ${{ steps.matrix.outputs.tickers }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build matrix
        id: matrix
        env:
          TICKERS_INPUT: ${{ github.event.inputs.tickers }}
        run: |
          if [ -n "$TICKERS_INPUT" ]; then
            TICKERS_JSON=$(python _system/scripts/build_vicki_dispatch_matrix.py --tickers "$TICKERS_INPUT")
          else
            TICKERS_JSON=$(python _system/scripts/build_vicki_dispatch_matrix.py --use-queue)
          fi
          echo "tickers=$TICKERS_JSON" >> "$GITHUB_OUTPUT"
          MAXP="${{ github.event.inputs.max_parallel }}"
          if [ -z "$MAXP" ] && [ -f _system/data/vicki_dispatch_queue.json ]; then
            MAXP=$(python -c "import json; print(json.load(open('_system/data/vicki_dispatch_queue.json')).get('max_parallel') or 2)")
          fi
          MAXP="${MAXP:-2}"
          echo "max_parallel=$MAXP" >> "$GITHUB_OUTPUT"
          echo "Vicki tickers: $TICKERS_JSON (max_parallel=$MAXP)"
      - name: Skip if empty
        if: steps.matrix.outputs.tickers == '[]'
        run: echo "No tickers to process."

  harvest:
    needs: prepare
    if: needs.prepare.outputs.tickers != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix:
        ticker: ${{ fromJson(needs.prepare.outputs.tickers) }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (marvin-agent)
        run: bash _system/scripts/ci_checkout_workspace.sh marvin-agent
      - uses: ./.github/actions/vicki-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ matrix.ticker }}
