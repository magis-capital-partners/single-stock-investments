name: Deploy OAuth Proxy (Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "dashboard/oauth-proxy/**"

permissions:
  contents: read

jobs:
  oauth-secrets:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: oauth-secrets
    if: needs.oauth-secrets.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - name: Sparse checkout oauth proxy
        run: |
          git sparse-checkout add dashboard/oauth-proxy
          git read-tree -mu HEAD
      - uses: ./.github/actions/deploy-oauth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  skip-no-secrets:
    needs: oauth-secrets
    if: needs.oauth-secrets.outputs.configured != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Manual deploy required
        run: |
          echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping CI deploy."
          echo "Deploy locally: cd dashboard/oauth-proxy && npx wrangler login && npx wrangler deploy"
          echo "Then set repo variable OAUTH_PROXY_URL to the worker URL."
