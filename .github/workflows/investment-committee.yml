name: Auto - Investment Committee

# A Power Zone commit creates committee_work. Each merged isolated-task PR
# changes that tree and automatically advances the next stage.
on:
  push:
    branches: [main]
    paths:
      - "*/research/committee_work/**/*.json"
      - "_system/scripts/committee_*.py"
      - "_system/scripts/investment_committee_pipeline.py"
      - ".github/workflows/investment-committee.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: investment-committee-auto
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ticker: ${{ steps.queue.outputs.ticker }}
      committee_date: ${{ steps.queue.outputs.committee_date }}
      action: ${{ steps.queue.outputs.action }}
      tasks: ${{ steps.queue.outputs.tasks }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /_system/scripts/**
            /*/research/committee_work/**
            /*/research/valuation.json
            /*/research/valuation_contract.json
            /*/research/valuation_route.json
            /*/research/valuation_workbench.json
            /*/research/thesis.md
      - id: queue
        run: python _system/scripts/select_committee_work.py --github-output "$GITHUB_OUTPUT"

  isolated-tasks:
    needs: prepare
    if: needs.prepare.outputs.action == 'advance'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.tasks) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/actions/llm-gate
            _system/config/llm_usage_policy.json
            _system/scripts/llm_call_gate.py
            _system/scripts/committee_task_runner.mjs
            _system/scripts/package.json
            _system/scripts/package-lock.json
            ${{ matrix.prompt_path }}
      - name: Admit committee judgment call
        id: llm_gate
        uses: ./.github/actions/llm-gate
        with:
          consumer: investment_committee
          subject: ${{ matrix.task_key }}
          reason: ${{ matrix.task_id }}
          evidence_hash: ${{ matrix.evidence_hash }}
      - uses: actions/setup-node@v4
        if: steps.llm_gate.outputs.approved == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: _system/scripts/package-lock.json
      - working-directory: _system/scripts
        if: steps.llm_gate.outputs.approved == 'true'
        run: npm ci --ignore-scripts
      - name: Run isolated committee task
        id: agent
        if: steps.llm_gate.outputs.approved == 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CURSOR_STARTING_REF: main
          TICKER: ${{ matrix.ticker }}
          COMMITTEE_DATE: ${{ matrix.as_of }}
          TASK_KEY: ${{ matrix.task_key }}
          PROMPT_PATH: ${{ matrix.prompt_path }}
          OUTPUT_PATH: ${{ matrix.output_path }}
        run: node _system/scripts/committee_task_runner.mjs
      - name: Record committee call outcome
        if: always() && steps.llm_gate.outputs.approved == 'true'
        env:
          STATUS: ${{ steps.agent.outcome == 'success' && 'completed' || 'failed' }}
        run: |
          python _system/scripts/llm_call_gate.py record \
            --consumer investment_committee --subject "${{ matrix.task_key }}" \
            --reason "${{ matrix.task_id }}" --evidence-hash "${{ matrix.evidence_hash }}" \
            --ledger "${{ steps.llm_gate.outputs.ledger }}" --status "$STATUS"
      - name: Upload compact committee audit
        if: always() && steps.llm_gate.outputs.approved == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: llm-audit-committee-${{ matrix.task_key }}-${{ github.run_id }}
          path: ${{ steps.llm_gate.outputs.ledger }}
          if-no-files-found: ignore
          retention-days: 7

  assemble:
    needs: prepare
    if: needs.prepare.outputs.action == 'assemble'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            _system
            ${{ needs.prepare.outputs.ticker }}/research
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate and assemble
        run: |
          python _system/scripts/committee_task_queue.py "${{ needs.prepare.outputs.ticker }}" --date "${{ needs.prepare.outputs.committee_date }}"
          python _system/scripts/investment_committee_pipeline.py validate "${{ needs.prepare.outputs.ticker }}" --date "${{ needs.prepare.outputs.committee_date }}"
          python _system/scripts/investment_committee_pipeline.py assemble "${{ needs.prepare.outputs.ticker }}" --date "${{ needs.prepare.outputs.committee_date }}"
      - name: Commit assembled committee
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.prepare.outputs.ticker }}/research/committee_${{ needs.prepare.outputs.committee_date }}.json" \
                  "${{ needs.prepare.outputs.ticker }}/research/committee_work/${{ needs.prepare.outputs.committee_date }}/manifest.json" \
                  "${{ needs.prepare.outputs.ticker }}/research/valuation_workbench.json"
          git commit -m "feat(ic): assemble ${{ needs.prepare.outputs.ticker }} committee ${{ needs.prepare.outputs.committee_date }}"
          git push origin HEAD:main

  caught-up:
    needs: prepare
    if: needs.prepare.outputs.action == 'none'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No committee stage is ready; the automatic queue is caught up."
