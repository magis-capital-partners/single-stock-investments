name: Marvin Deep Dive

# Modes: deep-dive (single ticker), auto-pick (new docs / force_rotate), batch (matrix queue).
# Daily auto-pick also runs in daily-sync.yml after download.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        type: choice
        options:
          - deep-dive
          - auto-pick
          - batch
        default: deep-dive
      ticker:
        description: "Ticker (required for deep-dive; optional override for auto-pick)"
        required: false
        type: string
      force_rotate:
        description: "auto-pick only: refresh oldest deep dive if no new documents"
        required: false
        type: boolean
        default: false
      tickers:
        description: "batch only: comma-separated tickers (empty = queue file)"
        required: false
        type: string
      max_parallel:
        description: "batch only: max concurrent jobs"
        required: false
        default: "3"
        type: string
  push:
    branches: [main]
    paths:
      - _system/data/deep_dive_dispatch_queue.json

permissions:
  contents: read

concurrency:
  group: marvin-deep-dive-${{ github.event.inputs.mode || 'batch' }}-${{ github.event.inputs.ticker || github.sha }}
  cancel-in-progress: false

jobs:
  single-ticker:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deep-dive'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: ./.github/actions/checkout-workspace
        with:
          profile: marvin-agent
      - name: Validate ticker
        run: |
          if [ -z "${{ github.event.inputs.ticker }}" ]; then
            echo "::error::ticker is required for deep-dive mode"
            exit 1
          fi
      - uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ github.event.inputs.ticker }}

  auto-pick:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'auto-pick'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: ./.github/actions/checkout-workspace
        with:
          profile: marvin-pick
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pick ticker
        id: pick
        env:
          TICKER_OVERRIDE: ${{ github.event.inputs.ticker }}
          FORCE_ROTATE: ${{ github.event.inputs.force_rotate }}
        run: |
          if [ -n "$TICKER_OVERRIDE" ]; then
            python _system/scripts/marvin_pick_ticker.py "$TICKER_OVERRIDE" --json > pick.json
          elif [ "$FORCE_ROTATE" = "true" ]; then
            python _system/scripts/marvin_pick_ticker.py --json --force-rotate > pick.json
          else
            python _system/scripts/marvin_pick_ticker.py --json --require-new > pick.json
          fi
          cat pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/marvin-agent
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ steps.pick.outputs.ticker }}
          pick_reason: ${{ steps.pick.outputs.reason }}
      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.pick.outputs.skip }}" = "true" ]; then
            echo "Skipped — no holdings with new primary documents since last deep dive."
            echo "Re-run auto-pick with force_rotate enabled to refresh the oldest analysis."
          elif [ -n "${{ steps.pick.outputs.ticker }}" ]; then
            echo "Refresh started for ${{ steps.pick.outputs.ticker }} (${{ steps.pick.outputs.reason }})."
          fi

  batch-prepare:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch')
    runs-on: ubuntu-latest
    outputs:
      tickers: ${{ steps.matrix.outputs.tickers }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
    steps:
      - uses: ./.github/actions/checkout-workspace
        with:
          profile: minimal
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build matrix
        id: matrix
        env:
          TICKERS_INPUT: ${{ github.event.inputs.tickers }}
        run: |
          if [ -n "$TICKERS_INPUT" ]; then
            TICKERS_JSON=$(python _system/scripts/build_deep_dive_dispatch_matrix.py --tickers "$TICKERS_INPUT")
          else
            TICKERS_JSON=$(python _system/scripts/build_deep_dive_dispatch_matrix.py --use-queue)
          fi
          echo "tickers=$TICKERS_JSON" >> "$GITHUB_OUTPUT"
          MAXP="${{ github.event.inputs.max_parallel }}"
          if [ -z "$MAXP" ] && [ -f _system/data/deep_dive_dispatch_queue.json ]; then
            MAXP=$(python -c "import json; print(json.load(open('_system/data/deep_dive_dispatch_queue.json')).get('max_parallel') or 3)")
          fi
          MAXP="${MAXP:-3}"
          echo "max_parallel=$MAXP" >> "$GITHUB_OUTPUT"
          echo "Batch tickers: $TICKERS_JSON (max_parallel=$MAXP)"
      - name: Skip if empty
        if: steps.matrix.outputs.tickers == '[]'
        run: echo "No tickers to process."

  batch-deep-dive:
    needs: batch-prepare
    if: needs.batch-prepare.outputs.tickers != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.batch-prepare.outputs.max_parallel) }}
      matrix:
        ticker: ${{ fromJson(needs.batch-prepare.outputs.tickers) }}
    steps:
      - uses: ./.github/actions/checkout-workspace
        with:
          profile: marvin-agent
      - uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ matrix.ticker }}
          pick_reason: batch_onboard_pending
