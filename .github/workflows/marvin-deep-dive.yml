name: Auto - Research Queue

# Evidence / contract-backfill queues only. This workflow never calls Cursor itself.
on:
  push:
    branches: [main]
    paths:
      - _system/data/deep_dive_dispatch_queue.json
      - _system/data/contract_backfill_queue.json
  # Allow queue-refill jobs (GITHUB_TOKEN pushes do not chain workflow runs).
  repository_dispatch:
    types: [research-queue-run]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: research-queue
  cancel-in-progress: false

jobs:
  batch-prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      jobs: ${{ steps.matrix.outputs.jobs }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/build_deep_dive_dispatch_matrix.py
            _system/scripts/marvin_pick_ticker.py
            _system/scripts/portfolio_registry.py
            _system/scripts/portfolio_news_common.py
            _system/scripts/build_research_agent_manifest.py
            _system/portfolio/registry.json
            _system/data/deep_dive_dispatch_queue.json
            _system/data/contract_backfill_queue.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: matrix
        run: |
          JOBS=$(python _system/scripts/build_deep_dive_dispatch_matrix.py --use-queue)
          echo "jobs=$JOBS" >> "$GITHUB_OUTPUT"
          # Keep agent PR pressure low so automerge/CI stay consistent.
          # contract_backfill is serial; onboard stays serial.
          echo "max_parallel=1" >> "$GITHUB_OUTPUT"

  batch:
    needs: batch-prepare
    if: needs.batch-prepare.outputs.jobs != '[]'
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.batch-prepare.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJson(needs.batch-prepare.outputs.jobs) }}
    uses: ./.github/workflows/research-agent-dispatch.yml
    with:
      ticker: ${{ matrix.ticker }}
      reason: ${{ matrix.reason }}
      consumer: ${{ matrix.consumer }}
      force: false
    secrets: inherit
