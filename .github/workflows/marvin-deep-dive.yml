name: Marvin Deep Dive

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker symbol (e.g. 8697.T, ICE, CSU)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: marvin-deep-dive-${{ github.event.inputs.ticker }}
  cancel-in-progress: false

jobs:
  deep-dive:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ticker input
        run: |
          TICKER="${{ github.event.inputs.ticker }}"
          if [ -z "$TICKER" ]; then
            echo "Ticker is required."
            exit 1
          fi
          echo "Ticker: $TICKER"

      - name: Run Marvin deep dive (Cloud Agent → PR)
        uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ github.event.inputs.ticker }}

      - name: Summary
        if: success()
        run: echo "After merge, Deploy Dashboard refreshes via push paths or workflow_run."
