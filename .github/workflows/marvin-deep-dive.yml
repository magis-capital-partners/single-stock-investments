name: Research Deep Dive Dispatch

# Compatibility UI for manual and queued deep dives. Every path delegates to
# the same evidence-hashed dispatcher; this workflow never calls Cursor itself.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        required: true
        type: choice
        options: [deep-dive, auto-pick, batch]
        default: deep-dive
      ticker:
        description: Ticker for deep-dive mode
        required: false
        type: string
      force:
        description: Explicit manual override for unchanged evidence
        required: false
        type: boolean
        default: false
      tickers:
        description: Batch comma-separated tickers; blank uses the queue
        required: false
        type: string
      max_parallel:
        description: Batch concurrency; one is safest for research PR sequencing
        required: false
        default: "1"
        type: string
  push:
    branches: [main]
    paths:
      - _system/data/deep_dive_dispatch_queue.json

permissions:
  contents: read
  pull-requests: write

jobs:
  single:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'batch'
    uses: ./.github/workflows/research-agent-dispatch.yml
    with:
      ticker: ${{ github.event.inputs.mode == 'deep-dive' && github.event.inputs.ticker || '' }}
      reason: ${{ github.event.inputs.mode == 'deep-dive' && 'manual_material_change' || '' }}
      force: ${{ github.event.inputs.force == 'true' }}
    secrets: inherit

  batch-prepare:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'batch')
    runs-on: ubuntu-latest
    outputs:
      tickers: ${{ steps.matrix.outputs.tickers }}
      max_parallel: ${{ steps.matrix.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/build_deep_dive_dispatch_matrix.py
            _system/data/deep_dive_dispatch_queue.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: matrix
        env:
          TICKERS_INPUT: ${{ github.event.inputs.tickers }}
          MAX_PARALLEL_INPUT: ${{ github.event.inputs.max_parallel }}
        run: |
          if [ -n "$TICKERS_INPUT" ]; then
            TICKERS=$(python _system/scripts/build_deep_dive_dispatch_matrix.py --tickers "$TICKERS_INPUT")
          else
            TICKERS=$(python _system/scripts/build_deep_dive_dispatch_matrix.py --use-queue)
          fi
          MAXP="${MAX_PARALLEL_INPUT:-1}"
          echo "tickers=$TICKERS" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$MAXP" >> "$GITHUB_OUTPUT"

  batch:
    needs: batch-prepare
    if: needs.batch-prepare.outputs.tickers != '[]'
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.batch-prepare.outputs.max_parallel) }}
      matrix:
        ticker: ${{ fromJson(needs.batch-prepare.outputs.tickers) }}
    uses: ./.github/workflows/research-agent-dispatch.yml
    with:
      ticker: ${{ matrix.ticker }}
      reason: batch_onboard_pending
      force: false
    secrets: inherit
