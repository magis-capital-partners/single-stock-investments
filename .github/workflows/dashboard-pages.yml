name: Deploy Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      # Deploy-only / light rebuild when committed dashboard or deploy scripts change.
      # Heavy research/data rebuilds happen in Data Pipeline before workflow_run deploy.
      - "dashboard/**"
      - "docs/**"
      - "_system/scripts/build_dashboard_data.py"
      - "_system/scripts/validate_dashboard_data.py"
      - "_system/scripts/ci_dashboard_deploy_mode.sh"
      - "_system/scripts/ci_rebuild_profile.py"
      - ".github/workflows/dashboard-pages.yml"
      - ".github/actions/publish-dashboard/**"
      - ".github/actions/rebuild-data/**"
      - ".github/actions/deploy-pages-retry/**"
  workflow_run:
    workflows:
      - Data Pipeline
      - Darwin Portfolio Refresh
      - Power Zone Universe
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  oauth-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  # Detect oauth-proxy path changes without cloning this monorepo.
  # Full checkout here previously hung/timed out and painted the whole deploy red
  # even when the Pages build job succeeded.
  oauth-changed:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Fingerprint the oauth-proxy directory at each ref (no clone; avoids
          # compare-API 300-file truncation on large merges).
          fingerprint() {
            local ref="$1"
            gh api "repos/${REPO}/contents/dashboard/oauth-proxy?ref=${ref}" \
              --jq 'if type=="array" then sort_by(.path) | map(.path + ":" + .sha) | join("|") else (.path + ":" + .sha) end' \
              2>/dev/null || echo "ABSENT"
          }
          BEFORE_FP="$(fingerprint "$BEFORE")"
          AFTER_FP="$(fingerprint "$AFTER")"
          if [ "$BEFORE_FP" != "$AFTER_FP" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  oauth-proxy:
    needs: [oauth-secrets, oauth-changed]
    if: |
      always() &&
      needs.oauth-secrets.outputs.configured == 'true' &&
      (
        (github.event_name == 'push' && needs.oauth-changed.outputs.changed == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - name: Sparse checkout oauth proxy
        run: |
          git sparse-checkout add dashboard/oauth-proxy
          git read-tree -mu HEAD
      - uses: ./.github/actions/deploy-oauth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build:
    needs: [oauth-secrets, oauth-proxy]
    if: |
      always() &&
      (needs.oauth-proxy.result == 'success' || needs.oauth-proxy.result == 'skipped') &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
            _system/scripts/ci_dashboard_deploy_mode.sh
          sparse-checkout-cone-mode: false
          fetch-depth: ${{ github.event_name == 'push' && 2 || 1 }}
      - name: Resolve deploy mode
        id: mode
        run: |
          bash _system/scripts/ci_dashboard_deploy_mode.sh
          echo "Deploy mode: $(cat "$GITHUB_OUTPUT")"
      - uses: jlumbroso/free-disk-space@main
        if: steps.mode.outputs.needs_disk_cleanup == 'true'
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - name: Checkout workspace (deploy mode)
        run: bash _system/scripts/ci_checkout_workspace.sh "${{ steps.mode.outputs.checkout_profile }}"
      - name: Rebuild and publish to GitHub Pages
        id: publish
        uses: ./.github/actions/publish-dashboard
        with:
          skip_rebuild: ${{ steps.mode.outputs.skip_rebuild }}
          rebuild_profile: ${{ steps.mode.outputs.rebuild_profile }}
          validate: ${{ steps.mode.outputs.validate }}
          skip_deploy: "false"
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
