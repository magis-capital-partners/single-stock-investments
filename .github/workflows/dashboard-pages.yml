name: Deploy Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "_system/scripts/build_dashboard_data.py"
      - "_system/scripts/build_nol_screener.py"
      - "_system/scripts/validate_dashboard_data.py"
      - "_system/portfolio/investment_sleeves.json"
      - "_system/reference/market-data/screens/**"
      - "_system/scripts/build_darwin_portfolio.py"
      - "_system/scripts/darwin/**"
      - "_system/portfolio/darwin_mandate.json"
      - "_system/portfolio/registry.json"
      - "_system/portfolio/holdings.md"
      - "_system/portfolio/classification.json"
      - "**/research/**"
      - "**/_download_log.txt"
      - "**/INDEX.csv"
      - "**/document-index.csv"
      - ".github/workflows/dashboard-pages.yml"
      - ".github/actions/**"
  workflow_dispatch:
    inputs:
      deploy_oauth:
        description: "Redeploy Cloudflare OAuth proxy before dashboard build"
        required: false
        type: boolean
        default: false
      skip_rebuild:
        description: "Deploy committed dashboard/ as-is (no Python rebuild; use for config-only changes)"
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows:
      - Marvin Onboard Ticker
      - Daily Download & Dashboard Sync
      - Drive Intake Sync
      - Activist Scan Sync
      - Portfolio News Ingest
      - Darwin Portfolio Refresh
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  oauth-secrets:
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  oauth-changed:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -q '^dashboard/oauth-proxy/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  oauth-proxy:
    needs: [oauth-secrets, oauth-changed]
    if: |
      always() &&
      needs.oauth-secrets.outputs.configured == 'true' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_oauth == true) ||
        (github.event_name == 'push' && needs.oauth-changed.result != 'failure' && needs.oauth-changed.outputs.changed == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - name: Sparse checkout oauth proxy
        run: |
          git sparse-checkout add dashboard/oauth-proxy
          git read-tree -mu HEAD
      - uses: ./.github/actions/deploy-oauth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  build:
    needs: [oauth-secrets, oauth-proxy]
    if: |
      always() &&
      (needs.oauth-proxy.result == 'success' || needs.oauth-proxy.result == 'skipped') &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (sparse — dashboard rebuild)
        if: github.event_name != 'workflow_dispatch' || inputs.skip_rebuild != true
        run: bash _system/scripts/ci_checkout_workspace.sh dashboard
      - name: Checkout workspace (config-only deploy)
        if: github.event_name == 'workflow_dispatch' && inputs.skip_rebuild == true
        run: bash _system/scripts/ci_checkout_workspace.sh minimal
      - name: Sparse checkout dashboard tree
        if: github.event_name == 'workflow_dispatch' && inputs.skip_rebuild == true
        run: |
          git sparse-checkout add dashboard
          git read-tree -mu HEAD
      - name: Rebuild and publish to GitHub Pages
        id: publish
        uses: ./.github/actions/publish-dashboard
        with:
          skip_rebuild: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_rebuild == true && 'true' || 'false' }}
          skip_deploy: "false"
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
          RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
          RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
          RESEARCH_VAULT_ROOT: _external/research-vault
