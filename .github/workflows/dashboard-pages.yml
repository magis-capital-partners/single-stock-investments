name: Deploy Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "_system/scripts/build_dashboard_data.py"
      - "_system/scripts/build_nol_screener.py"
      - "_system/scripts/validate_dashboard_data.py"
      - "_system/portfolio/investment_sleeves.json"
      - "_system/reference/market-data/screens/**"
      - "_system/scripts/build_darwin_portfolio.py"
      - "_system/scripts/darwin/**"
      - "_system/portfolio/darwin_mandate.json"
      - "_system/portfolio/registry.json"
      - "_system/portfolio/holdings.md"
      - "_system/portfolio/classification.json"
      - "**/research/**"
      - "**/_download_log.txt"
      - "**/INDEX.csv"
      - "**/document-index.csv"
  workflow_dispatch:
    inputs:
      deploy_oauth:
        description: "Redeploy Cloudflare OAuth proxy before dashboard build"
        required: false
        type: boolean
        default: false
  # GITHUB_TOKEN pushes from data pipelines do not trigger push workflows — redeploy here.
  workflow_run:
    workflows:
      - Marvin Onboard Ticker
      - Daily Download & Dashboard Sync
      - Drive Intake Sync
      - Activist Scan Sync
      - Portfolio News Ingest
      - Darwin Portfolio Refresh
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

jobs:
  oauth-changed:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -q '^dashboard/oauth-proxy/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  oauth-proxy:
    needs: oauth-changed
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_oauth == true) ||
        (github.event_name == 'push' && needs.oauth-changed.outputs.changed == 'true')
      ) &&
      secrets.CLOUDFLARE_API_TOKEN != ''
    uses: ./.github/workflows/_deploy-oauth.yml
    secrets: inherit

  publish:
    needs: oauth-proxy
    if: |
      always() &&
      (needs.oauth-proxy.result == 'success' || needs.oauth-proxy.result == 'skipped') &&
      (
        github.event_name != 'workflow_run' ||
        github.event.workflow_run.conclusion == 'success'
      )
    uses: ./.github/workflows/_publish-dashboard.yml
