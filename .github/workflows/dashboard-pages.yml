name: Deploy Dashboard (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "_system/scripts/build_dashboard_data.py"
      - "_system/scripts/build_darwin_portfolio.py"
      - "_system/scripts/darwin/**"
      - "_system/portfolio/darwin_mandate.json"
      - "_system/portfolio/registry.json"
      - "_system/portfolio/holdings.md"
      - "_system/portfolio/classification.json"
      - "**/research/**"
      - "**/_download_log.txt"
      - "**/INDEX.csv"
      - "**/document-index.csv"
  workflow_dispatch:
  # GITHUB_TOKEN pushes from onboard/daily-sync do not trigger push workflows — redeploy here.
  workflow_run:
    workflows:
      - "Marvin Onboard Ticker"
      - "Daily Download & Dashboard Sync"
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Darwin dependencies
        run: pip install -r _system/scripts/requirements-darwin.txt

      - name: Download IRA market data (Tier A)
        run: python _system/scripts/download_ira_research.py --tier A
        continue-on-error: true

      - name: Build Darwin portfolio
        run: python _system/scripts/build_darwin_portfolio.py --fast

      - name: Rebuild dashboard JSON
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
        run: python _system/scripts/build_dashboard_data.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
