name: Darwin Portfolio Refresh

# Manual only — no schedule, no push. Run when Darwin code/mandate needs a full rebuild.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (sparse — no ticker PDF trees)
        timeout-minutes: 15
        run: |
          set -euo pipefail
          COUNT=$(python3 _system/scripts/ci_sparse_checkout_paths.py --count darwin)
          echo "darwin sparse extra paths=$COUNT (cap 200)"
          if [ "$COUNT" -gt 200 ]; then
            echo "::error::darwin sparse profile exploded ($COUNT paths). Aborting."
            exit 1
          fi
          bash _system/scripts/ci_checkout_workspace.sh darwin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild Darwin portfolio and dashboard data
        uses: ./.github/actions/rebuild-data
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
        with:
          profile: darwin-full

      - name: Commit artifacts
        uses: ./.github/actions/commit-main
        with:
          message: "chore(darwin): refresh portfolio and market data"
          git_add: "-A"

      - name: Pipeline summary
        run: echo "Darwin Portfolio Refresh complete. Deploy Dashboard chains via workflow_run."
