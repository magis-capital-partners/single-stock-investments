name: Darwin Portfolio Refresh

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "_system/scripts/darwin/**"
      - "_system/portfolio/darwin_mandate.json"
      - "**/research/valuation.json"
      - "_system/portfolio/registry.json"

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild Darwin portfolio and dashboard data
        uses: ./.github/actions/rebuild-data
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}
        with:
          profile: darwin-full

      - name: Commit artifacts
        uses: ./.github/actions/commit-main
        with:
          message: "chore(darwin): refresh portfolio and market data"
          git_add: "-A"

      - name: Pipeline summary
        run: echo "Darwin Portfolio Refresh complete. Deploy Dashboard chains via workflow_run."
