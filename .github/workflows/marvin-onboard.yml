name: Auto - Onboard Ticker

on:
  repository_dispatch:
    types: [onboard-ticker]

permissions:
  contents: write

concurrency:
  # This workflow writes directly to main before it starts the PR-only deep dive.
  group: data-commit-main
  cancel-in-progress: false

jobs:
  onboard:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      ticker: ${{ steps.vars.outputs.ticker }}
      watchlist_only: ${{ steps.vars.outputs.watchlist_only }}
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault

    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (full — onboard writes documents)
        run: bash _system/scripts/ci_checkout_workspace.sh full

      - name: Resolve inputs
        id: vars
        env:
          DISPATCH_TOKEN: ${{ secrets.ONBOARD_DISPATCH_TOKEN }}
        run: |
          PAYLOAD='${{ toJson(github.event.client_payload) }}'
          echo "ticker=$(echo "$PAYLOAD" | jq -r '.ticker // empty')" >> "$GITHUB_OUTPUT"
          echo "company=$(echo "$PAYLOAD" | jq -r '.company // empty')" >> "$GITHUB_OUTPUT"
          echo "market=$(echo "$PAYLOAD" | jq -r '.market // "US"')" >> "$GITHUB_OUTPUT"
          echo "cik=$(echo "$PAYLOAD" | jq -r '.cik // empty')" >> "$GITHUB_OUTPUT"
          echo "ir_url=$(echo "$PAYLOAD" | jq -r '.ir_url // empty')" >> "$GITHUB_OUTPUT"
          echo "from_watchlist=$(echo "$PAYLOAD" | jq -r '.from_watchlist // false')" >> "$GITHUB_OUTPUT"
          echo "watchlist_only=$(echo "$PAYLOAD" | jq -r '.watchlist_only // false')" >> "$GITHUB_OUTPUT"
          echo "download_8k_exhibits=$(echo "$PAYLOAD" | jq -r '.download_8k_exhibits // false')" >> "$GITHUB_OUTPUT"
          TOKEN=$(echo "$PAYLOAD" | jq -r '.token // empty')
          if [ -n "$DISPATCH_TOKEN" ] && [ -n "$TOKEN" ] && [ "$TOKEN" != "$DISPATCH_TOKEN" ]; then
            echo "::error::Invalid onboard dispatch token"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run onboard orchestrator
        run: |
          ARGS=(
            --ticker "${{ steps.vars.outputs.ticker }}"
            --company "${{ steps.vars.outputs.company }}"
            --market "${{ steps.vars.outputs.market }}"
          )
          [ -n "${{ steps.vars.outputs.cik }}" ] && ARGS+=(--cik "${{ steps.vars.outputs.cik }}")
          [ -n "${{ steps.vars.outputs.ir_url }}" ] && ARGS+=(--ir-url "${{ steps.vars.outputs.ir_url }}")
          [ "${{ steps.vars.outputs.from_watchlist }}" = "true" ] && ARGS+=(--from-watchlist)
          [ "${{ steps.vars.outputs.watchlist_only }}" = "true" ] && ARGS+=(--watchlist-only)
          [ "${{ steps.vars.outputs.download_8k_exhibits }}" = "true" ] && ARGS+=(--download-8k-exhibits)
          ARGS+=(--no-deep-dive)
          python _system/scripts/onboard_ticker.py "${ARGS[@]}"

      - name: Commit and push to main
        uses: ./.github/actions/commit-main
        with:
          message: "feat: onboard ${{ steps.vars.outputs.ticker }} ($(date -u +%Y-%m-%d))"

      - name: Summary
        if: success()
        run: |
          echo "Onboard finished for ${{ steps.vars.outputs.ticker }}"
          echo "Research is admitted separately only when its evidence manifest is ready and unprocessed."

  research:
    needs: onboard
    if: needs.onboard.outputs.watchlist_only != 'true'
    uses: ./.github/workflows/research-agent-dispatch.yml
    with:
      ticker: ${{ needs.onboard.outputs.ticker }}
      reason: onboard_pending
      force: false
    secrets: inherit
