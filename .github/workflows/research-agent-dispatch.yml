name: Research Agent Dispatcher

on:
  workflow_call:
    inputs:
      ticker:
        type: string
        required: false
        default: ""
      reason:
        type: string
        required: false
        default: ""
      force:
        type: boolean
        required: false
        default: false
      consumer:
        type: string
        required: false
        default: "marvin_research"
        description: LLM usage policy consumer id
    secrets:
      CURSOR_API_KEY:
        required: false
      HK_PDFS_ROOT:
        required: false
      RESEARCH_VAULT_REPO_URL:
        required: false
      RESEARCH_VAULT_CLONE_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  select:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      ticker: ${{ steps.select.outputs.ticker }}
      reason: ${{ steps.select.outputs.reason }}
      skip: ${{ steps.select.outputs.skip }}
      skip_reason: ${{ steps.select.outputs.skip_reason }}
      evidence_hash: ${{ steps.select.outputs.evidence_hash }}
      primary_evidence_count: ${{ steps.select.outputs.primary_evidence_count }}
      manifest_json: ${{ steps.select.outputs.manifest_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout evidence-selection workspace
        run: bash _system/scripts/ci_checkout_workspace.sh marvin-pick main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: select
        env:
          TICKER_INPUT: ${{ inputs.ticker }}
          REASON_INPUT: ${{ inputs.reason }}
          FORCE_INPUT: ${{ inputs.force }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=(--json --require-new)
          if [ -n "$TICKER_INPUT" ]; then ARGS=("$TICKER_INPUT" --json --require-new); fi
          if [ "$FORCE_INPUT" = "true" ]; then ARGS+=(--force); fi
          python _system/scripts/marvin_pick_ticker.py "${ARGS[@]}" > pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          PICK_REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          if [ -n "$REASON_INPUT" ] && [ -n "$TICKER" ]; then PICK_REASON="$REASON_INPUT"; fi
          if [ "$SKIP" = "true" ] || [ -z "$TICKER" ]; then
            echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
            echo "reason=$PICK_REASON" >> "$GITHUB_OUTPUT"
            echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$PICK_REASON" >> "$GITHUB_OUTPUT"
            echo "evidence_hash=" >> "$GITHUB_OUTPUT"
            echo "primary_evidence_count=0" >> "$GITHUB_OUTPUT"
            echo "manifest_json={}" >> "$GITHUB_OUTPUT"
            cat pick.json
            exit 0
          fi
          python _system/scripts/build_research_agent_manifest.py "$TICKER" --reason "$PICK_REASON" > manifest.json
          HASH=$(python -c "import json; print(json.load(open('manifest.json'))['evidence_hash'])")
          PRIMARY_COUNT=$(python -c "import json; print(json.load(open('manifest.json'))['artifact_count'])")
          MANIFEST=$(python -c "import json; print(json.dumps(json.load(open('manifest.json')), separators=(',', ':')))")
          # Count only non-conflicting cursor PRs. Dirty/conflicted agent PRs do not
          # represent active research capacity and must not block new admissions.
OPEN_CURSOR_COUNT=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 100 --json headRefName,mergeable,mergeStateStatus --jq '[.[] | select(.headRefName|startswith("cursor/")) | select((.mergeable != "CONFLICTING") and (.mergeStateStatus != "DIRTY"))] | length')
          MAX_OPEN_CURSOR_PRS="${MAX_OPEN_CURSOR_PRS:-5}"
          if [ "${OPEN_CURSOR_COUNT}" -ge "${MAX_OPEN_CURSOR_PRS}" ]; then
            echo "ticker=" >> "$GITHUB_OUTPUT"
            echo "reason=cursor_pr_backlog_${OPEN_CURSOR_COUNT}" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=cursor_pr_backlog_${OPEN_CURSOR_COUNT}" >> "$GITHUB_OUTPUT"
            echo "evidence_hash=$HASH" >> "$GITHUB_OUTPUT"
            echo "primary_evidence_count=$PRIMARY_COUNT" >> "$GITHUB_OUTPUT"
            echo "manifest_json=$MANIFEST" >> "$GITHUB_OUTPUT"
            echo "### Research dispatch suppressed" >> "$GITHUB_STEP_SUMMARY"
            echo "Open mergeable cursor/* PRs=${OPEN_CURSOR_COUNT} >= ${MAX_OPEN_CURSOR_PRS}; waiting for automerge drain." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          ACTIVE_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --json number,headRefName,title | TICKER="$TICKER" python -c 'import json, os, sys; ticker=os.environ["TICKER"].upper(); prs=json.load(sys.stdin); matches=[p for p in prs if p["headRefName"].startswith("cursor/") and (ticker in p["headRefName"].upper() or ticker in p["title"].upper())]; print(matches[0]["number"] if matches else "")')
          if [ -n "$ACTIVE_PR" ]; then
            echo "ticker=" >> "$GITHUB_OUTPUT"
            echo "reason=active_cursor_pr_$ACTIVE_PR" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=active_cursor_pr_$ACTIVE_PR" >> "$GITHUB_OUTPUT"
            echo "evidence_hash=$HASH" >> "$GITHUB_OUTPUT"
            echo "primary_evidence_count=$PRIMARY_COUNT" >> "$GITHUB_OUTPUT"
            echo "manifest_json=$MANIFEST" >> "$GITHUB_OUTPUT"
            echo "### Research dispatch suppressed" >> "$GITHUB_STEP_SUMMARY"
            echo "Ticker **$TICKER** already has Cursor PR #$ACTIVE_PR open; no overlapping agent run was started." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "reason=$PICK_REASON" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "evidence_hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "primary_evidence_count=$PRIMARY_COUNT" >> "$GITHUB_OUTPUT"
          echo "manifest_json=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "### Research dispatch admitted" >> "$GITHUB_STEP_SUMMARY"
          echo "Ticker **$TICKER** admitted on primary-evidence fingerprint \`$HASH\` ($PRIMARY_COUNT source record(s))." >> "$GITHUB_STEP_SUMMARY"
          cat manifest.json

  research:
    needs: select
    if: needs.select.outputs.skip != 'true' && needs.select.outputs.ticker != ''
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: research-agent-${{ needs.select.outputs.ticker }}
      cancel-in-progress: true
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout constrained research workspace
        run: bash _system/scripts/ci_checkout_workspace.sh marvin-agent main
      - name: Persist run-local evidence manifest
        env:
          MANIFEST_JSON: ${{ needs.select.outputs.manifest_json }}
          TICKER: ${{ needs.select.outputs.ticker }}
        run: |
          mkdir -p "$TICKER/research"
          printf '%s\n' "$MANIFEST_JSON" > "$TICKER/research/research_agent_manifest.json"
      - uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ needs.select.outputs.ticker }}
          pick_reason: ${{ needs.select.outputs.reason }}
          evidence_hash: ${{ needs.select.outputs.evidence_hash }}
          evidence_manifest: ${{ needs.select.outputs.ticker }}/research/research_agent_manifest.json
          evidence_manifest_json: ${{ needs.select.outputs.manifest_json }}
          force: ${{ inputs.force }}
          consumer: ${{ inputs.consumer || 'marvin_research' }}

  caught-up:
    needs: select
    if: needs.select.outputs.skip == 'true' || needs.select.outputs.ticker == ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "No Cursor research call—no unprocessed material evidence is ready."
