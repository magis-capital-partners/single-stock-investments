name: Letter Backfill

on:
  schedule:
    # Sunday 16:00 UTC — off the 06:00 activist slot and the 10:00 full
    # downloads run so heavy jobs do not queue behind each other.
    - cron: "0 16 * * 0"
  workflow_dispatch:
    inputs:
      since_year:
        description: "Optional lower bound year (e.g. 2024). Empty = all quarters."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

env:
  RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
  RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
  RESEARCH_VAULT_ROOT: _external/research-vault

jobs:
  # Cold Drive import of ~20k PDFs can take ~4h. Commit the vault *before*
  # text extract so a later timeout does not throw away the download, and so
  # the next run can skip existing PDFs by size/sha.
  download-letters:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal + scripts)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal

      - name: Check Google credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS_JSON is not configured."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Checkout research vault
        uses: ./.github/actions/checkout-vault

      - name: Configure Google credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Import letters from Google Drive
        env:
          SINCE_YEAR: ${{ github.event.inputs.since_year || '' }}
        run: |
          ARGS=(--all --skip-text)
          if [ -n "$SINCE_YEAR" ]; then
            ARGS+=(--since-year "$SINCE_YEAR")
          fi
          python _system/scripts/import_drive_letter_orphans.py "${ARGS[@]}"

      - name: Commit downloaded letter PDFs to research vault
        uses: ./.github/actions/commit-vault
        with:
          message: |
            Download superinvestor letter PDFs from Google Drive.

            Automated import from letter-backfill download-letters job.
          git_add: superinvestor-letters/

  extract-and-publish:
    needs: download-letters
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (minimal + scripts)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Checkout research vault
        uses: ./.github/actions/checkout-vault

      - name: Extract text from local letter PDFs
        env:
          SINCE_YEAR: ${{ github.event.inputs.since_year || '' }}
        run: |
          ARGS=(--skip-download)
          if [ -n "$SINCE_YEAR" ]; then
            ARGS+=(--since-year "$SINCE_YEAR")
          fi
          python _system/scripts/import_drive_letter_orphans.py "${ARGS[@]}"

      - name: Letter date parser gold gate
        run: make letter-date-check

      - name: Configure Google credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "Skipping Drive registry sync — credentials not configured."
            echo "SKIP_DRIVE_SYNC=1" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Sync letter registry to Drive
        if: env.SKIP_DRIVE_SYNC != '1'
        run: make document-sync-drive-letters

      - name: Commit letter extracts to research vault
        uses: ./.github/actions/commit-vault
        with:
          message: |
            Extract text for superinvestor letters.

            Automated extract from letter-backfill extract-and-publish job.
          git_add: superinvestor-letters/

      - name: Rebuild ops dashboard payloads
        run: |
          python _system/scripts/repair_letter_dates.py --apply
          python _system/scripts/build_document_registry.py
          python _system/scripts/build_letter_drive_links.py
          python _system/scripts/build_superinvestor_insights.py
          python _system/scripts/build_insights.py
          python _system/scripts/build_dashboard_data.py

      - name: Commit ops repo dashboard updates
        uses: ./.github/actions/commit-main
        with:
          message: |
            Refresh dashboard payloads after letter backfill.

            Rebuild insights and document registry from research-vault letter corpus.
          git_add: >-
            _system/reference/document-store/letter_drive_links.json
            _system/reference/document-store/drive_filename_index.json
            dashboard/data/
