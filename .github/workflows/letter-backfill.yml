name: Letter Backfill

on:
  schedule:
    # Sunday 16:00 UTC — off the 06:00 activist slot and the 10:00 full
    # downloads run so heavy jobs do not queue behind each other.
    - cron: "0 16 * * 0"
    # Wednesday mid-week catch-up for new quarter drops (recent years only).
    - cron: "0 15 * * 3"
  workflow_dispatch:
    inputs:
      since_year:
        description: "Lower bound year (e.g. 2026). Empty on manual = all; schedule defaults to prior year."
        required: false
        default: ""
      quarter:
        description: "Optional single quarter (e.g. 2026Q2). Overrides since_year when set."
        required: false
        default: ""
      shard_count:
        description: "Deterministic shard count (each shard is its own job/timeout)."
        required: false
        default: "8"
      full_history:
        description: "Set true to import all years (slow). Default false uses recent-year window on schedule."
        required: false
        default: "false"

permissions:
  contents: write

env:
  RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
  RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
  RESEARCH_VAULT_ROOT: _external/research-vault

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shard_count: ${{ steps.matrix.outputs.shard_count }}
      shard_matrix: ${{ steps.matrix.outputs.shard_matrix }}
      since_year: ${{ steps.window.outputs.since_year }}
      quarter: ${{ steps.window.outputs.quarter }}
    steps:
      - id: matrix
        env:
          RAW: ${{ github.event.inputs.shard_count || '8' }}
        run: |
          set -euo pipefail
          COUNT="$RAW"
          if ! [[ "$COUNT" =~ ^[0-9]+$ ]] || [ "$COUNT" -lt 1 ] || [ "$COUNT" -gt 16 ]; then
            echo "::error::shard_count must be an integer 1..16 (got '$COUNT')"
            exit 1
          fi
          MATRIX=$(python -c "import json; print(json.dumps({'shard': list(range($COUNT))}))")
          echo "shard_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "shard_matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Using $COUNT deterministic letter shards"

      - id: window
        env:
          INPUT_SINCE: ${{ github.event.inputs.since_year || '' }}
          INPUT_QUARTER: ${{ github.event.inputs.quarter || '' }}
          FULL_HISTORY: ${{ github.event.inputs.full_history || 'false' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          QUARTER="$(echo "${INPUT_QUARTER:-}" | tr '[:lower:]' '[:upper:]')"
          SINCE="${INPUT_SINCE:-}"
          if [ -n "$QUARTER" ]; then
            SINCE=""
          elif [ "${FULL_HISTORY}" = "true" ]; then
            SINCE=""
          elif [ -z "$SINCE" ]; then
            # Scheduled / default manual: recent window so new quarter drops finish.
            # Prior calendar year catches late Q4 filings into the next year.
            SINCE=$(( $(date -u +%Y) - 1 ))
          fi
          echo "quarter=$QUARTER" >> "$GITHUB_OUTPUT"
          echo "since_year=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Import window: quarter=${QUARTER:-all} since_year=${SINCE:-all} event=$EVENT_NAME"

  # Cold Drive import previously timed out as one job. Split into deterministic
  # shards. Each shard downloads + extracts in the SAME job because research-vault
  # gitignores PDFs (only .txt extracts are committed). A separate extract job
  # cannot see PDFs from a prior runner.
  ingest-letters:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.shard_matrix) }}
    concurrency:
      group: letter-vault-ingest-${{ matrix.shard }}
      cancel-in-progress: false
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Checkout workspace (minimal + scripts)
        run: bash _system/scripts/ci_checkout_workspace.sh minimal

      - name: Check Google credentials secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "GOOGLE_APPLICATION_CREDENTIALS_JSON is not configured."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Checkout research vault
        uses: ./.github/actions/checkout-vault

      - name: Configure Google credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Import + extract letter shard from Google Drive
        env:
          SINCE_YEAR: ${{ needs.prepare.outputs.since_year }}
          QUARTER: ${{ needs.prepare.outputs.quarter }}
          SHARD: ${{ matrix.shard }}
          SHARD_COUNT: ${{ needs.prepare.outputs.shard_count }}
        run: |
          set -euo pipefail
          ARGS=(--shard-index "$SHARD" --shard-count "$SHARD_COUNT")
          if [ -n "${QUARTER:-}" ]; then
            ARGS+=(--quarter "$QUARTER")
          else
            ARGS+=(--all)
            if [ -n "${SINCE_YEAR:-}" ]; then
              ARGS+=(--since-year "$SINCE_YEAR")
            fi
          fi
          python _system/scripts/import_drive_letter_orphans.py "${ARGS[@]}"

      - name: Commit letter extracts to research vault
        uses: ./.github/actions/commit-vault
        with:
          message: |
            Ingest superinvestor letters (shard ${{ matrix.shard }}/${{ needs.prepare.outputs.shard_count }}).

            Download + text extract in one job; PDFs remain gitignored.
          git_add: superinvestor-letters/

  publish-dashboard:
    needs: [prepare, ingest-letters]
    runs-on: ubuntu-latest
    timeout-minutes: 180
    concurrency:
      group: data-commit-main
      cancel-in-progress: false
    steps:
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      # pages profile includes dashboard/ so commit-main can stage rebuilt payloads.
      # minimal omits dashboard and git add then fails under sparse-checkout rules.
      - name: Checkout workspace (scripts + dashboard)
        run: bash _system/scripts/ci_checkout_workspace.sh pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Checkout research vault
        uses: ./.github/actions/checkout-vault

      - name: Assert Makefile and dashboard present
        run: |
          test -f Makefile
          test -d dashboard/data

      - name: Letter date parser gold gate
        run: |
          python _system/scripts/calibrate_letter_dates.py --gold
          python -m unittest _system/scripts/test_letter_date_parser.py _system/scripts/test_fund_registry_date.py

      - name: Configure Google credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "Skipping Drive registry sync — credentials not configured."
            echo "SKIP_DRIVE_SYNC=1" >> "$GITHUB_ENV"
            exit 0
          fi
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Refresh Drive filename index (coverage source of truth)
        if: env.SKIP_DRIVE_SYNC != '1'
        run: python _system/scripts/build_drive_filename_index.py

      - name: Sync letter registry to Drive
        if: env.SKIP_DRIVE_SYNC != '1'
        run: |
          python _system/scripts/build_document_registry.py
          python _system/scripts/sync_pdf_store_google_drive.py --root-key hedge_fund_letters

      - name: Rebuild ops dashboard payloads
        run: |
          python _system/scripts/repair_letter_dates.py --apply
          python _system/scripts/build_document_registry.py
          python _system/scripts/build_letter_drive_links.py
          python _system/scripts/build_superinvestor_insights.py
          python _system/scripts/build_insights.py
          python _system/scripts/refresh_cvr_universe.py
          python _system/scripts/build_dashboard_data.py

      - name: Letter Drive coverage gate
        env:
          SINCE_YEAR: ${{ needs.prepare.outputs.since_year }}
          QUARTER: ${{ needs.prepare.outputs.quarter }}
        run: |
          set -euo pipefail
          ARGS=(--fail-under 0.85 --max-missing 25)
          if [ -n "${QUARTER:-}" ]; then
            ARGS+=(--quarter "$QUARTER")
          elif [ -n "${SINCE_YEAR:-}" ]; then
            ARGS+=(--since-year "$SINCE_YEAR")
          else
            ARGS+=(--since-year "$(( $(date -u +%Y) - 1 ))")
          fi
          python _system/scripts/check_letter_drive_coverage.py "${ARGS[@]}"

      - name: Commit ops repo dashboard updates
        uses: ./.github/actions/commit-main
        with:
          message: |
            Refresh dashboard payloads after letter backfill.

            Rebuild insights and document registry from research-vault letter corpus.
          git_add: >-
            _system/reference/document-store/letter_drive_links.json
            _system/reference/document-store/drive_filename_index.json
            dashboard/data/
