name: Letter Backfill

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      since_year:
        description: "Only import quarters from this year (optional)"
        required: false
        type: string
      quarter:
        description: "Single quarter e.g. 2025Q4 (optional)"
        required: false
        type: string
      max_files:
        description: "Limit files for smoke test (0 = all)"
        required: false
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  letter-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (full Ś letter PDFs + txt)
        run: bash _system/scripts/ci_checkout_workspace.sh full

      - name: Check Google credentials secret
        id: google_creds
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "GOOGLE_APPLICATION_CREDENTIALS_JSON is not configured."
            exit 1
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Configure Google credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Import letters from Google Drive
        run: |
          ARGS=(--all --build)
          if [ -n "${{ inputs.since_year }}" ]; then
            ARGS+=(--since-year "${{ inputs.since_year }}")
          fi
          if [ -n "${{ inputs.quarter }}" ]; then
            ARGS=(--quarter "${{ inputs.quarter }}" --build)
          fi
          if [ "${{ inputs.max_files }}" != "0" ] && [ -n "${{ inputs.max_files }}" ]; then
            ARGS+=(--max-files "${{ inputs.max_files }}")
          fi
          python _system/scripts/import_drive_letter_orphans.py "${ARGS[@]}"

      - name: Sync letter registry to Drive
        run: make document-sync-drive-letters

      - name: Commit letter corpus updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            _system/reference/superinvestor-letters/ \
            _system/reference/document-store/letter_drive_links.json \
            _system/reference/document-store/drive_filename_index.json \
            dashboard/data/insights.json \
            dashboard/data/document_registry.json \
            dashboard/data/document_catalog.json \
            dashboard/data/dashboard_data.json \
            docs/data/
          if git diff --staged --quiet; then
            echo "No letter corpus changes to commit."
            exit 0
          fi
          git commit -m "$(cat <<'EOF'
Backfill superinvestor letters from Google Drive.

Import hedge-fund letter PDFs into the local corpus, rebuild letter_index/fund_registry, and refresh dashboard payloads.
EOF
)"
          git push
