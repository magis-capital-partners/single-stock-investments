name: Daily Download & Dashboard Sync

on:
  schedule:
    - cron: "0 12 * * *"  # Daily 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-commit-main
  cancel-in-progress: false

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install transcript pipeline dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils
          pip install -r _system/scripts/requirements.txt -r _system/scripts/requirements-transcripts.txt

      - name: Run portfolio downloads
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
          POLYGON_EARNINGS_CACHE_MAX_AGE_HOURS: "36"
        run: python _system/scripts/download_all_holdings.py

      - name: Commit and push workspace
        uses: ./.github/actions/commit-main
        with:
          message: "chore: daily download sync $(date -u +%Y-%m-%d)"

  portfolio-news:
    needs: download-and-sync
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      PORTFOLIO_NEWS_WINDOW_DAYS: "30"
      PORTFOLIO_NEWS_POLYGON_REQS_PER_MIN: "5"
      PORTFOLIO_NEWS_MAX_PAGES: "15"
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r _system/scripts/requirements-news.txt

      - name: Ingest portfolio news
        working-directory: _system/scripts
        run: python ingest_portfolio_news.py

      - name: Commit news artifacts
        run: |
          git add dashboard/data/portfolio_news.json docs/data/portfolio_news.json _system/data/news_seen.json _system/reviews/pending/news_*.md
          git add '*/research/news/news_index.json' 2>/dev/null || true
          bash _system/scripts/ci_push_main.sh "chore: daily portfolio news $(date -u +%Y-%m-%d)"

  marvin-refresh:
    needs: portfolio-news
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pick ticker (new documents or valuation news since last deep dive)
        id: pick
        run: |
          python _system/scripts/marvin_pick_ticker.py --json --require-new > pick.json
          cat pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Run Marvin refresh (Cloud Agent → PR)
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ steps.pick.outputs.ticker }}
          pick_reason: ${{ steps.pick.outputs.reason }}

      - name: Refresh summary
        if: always()
        run: |
          if [ "${{ steps.pick.outputs.skip }}" = "true" ]; then
            echo "No refresh — no holdings with new documents or valuation news since last deep dive."
          elif [ -n "${{ steps.pick.outputs.ticker }}" ]; then
            echo "Refresh PR started for ${{ steps.pick.outputs.ticker }} (${{ steps.pick.outputs.reason }})."
          fi

  pipeline-summary:
    needs: marvin-refresh
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: echo "Daily Download & Dashboard Sync complete. Deploy Dashboard chains via workflow_run."
