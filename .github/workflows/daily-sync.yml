name: Auto - Daily Research

# Data Pipeline owns deterministic downloads. After a successful download job,
# the shared dispatcher admits at most one unprocessed material evidence change.
on:
  workflow_run:
    workflows: ["Data Pipeline"]
    types: [completed]
    branches: [main]
  repository_dispatch:
    types: [research-evidence-ready]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: daily-research-dispatch
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'repository_dispatch' || github.event.workflow_run.conclusion == 'success'
    outputs:
      downloads_ready: ${{ steps.check.outputs.downloads_ready }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "downloads_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name=="downloads") | .conclusion' 2>/dev/null || true)
          if echo "$JOBS" | grep -qx success; then
            echo "downloads_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "downloads_ready=false" >> "$GITHUB_OUTPUT"
            echo "No research dispatch—the deterministic download stage did not complete."
          fi

  research:
    needs: gate
    if: needs.gate.outputs.downloads_ready == 'true'
    uses: ./.github/workflows/research-agent-dispatch.yml
    with:
      ticker: ""
      reason: ""
      force: false
    secrets: inherit
