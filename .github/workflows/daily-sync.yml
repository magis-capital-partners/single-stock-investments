name: Daily Download & Dashboard Sync

# Runs daily. The full document/transcript harvest (network + OCR heavy) only
# runs on Mon/Thu; every other day does a light market/thematic/dashboard
# refresh. Use the `force_full_harvest` dispatch input to force a full run.

on:
  schedule:
    - cron: "0 12 * * *"  # Daily 12:00 UTC
  workflow_dispatch:
    inputs:
      force_full_harvest:
        description: "Run the full document/transcript harvest regardless of weekday"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: daily-portfolio-sync
  cancel-in-progress: false

jobs:
  download-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      heavy: ${{ steps.mode.outputs.heavy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide harvest mode
        id: mode
        run: |
          DOW=$(date -u +%u)  # 1=Mon .. 7=Sun
          HEAVY=false
          # Full harvest on Monday (1) and Thursday (4).
          if [ "$DOW" = "1" ] || [ "$DOW" = "4" ]; then HEAVY=true; fi
          if [ "${{ github.event.inputs.force_full_harvest }}" = "true" ]; then HEAVY=true; fi
          echo "heavy=$HEAVY" >> "$GITHUB_OUTPUT"
          echo "Day-of-week=$DOW heavy=$HEAVY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            _system/scripts/requirements.txt
            _system/scripts/requirements-transcripts.txt

      - name: Install base dependencies
        run: pip install -r _system/scripts/requirements.txt

      - name: Install transcript pipeline dependencies (full harvest only)
        if: steps.mode.outputs.heavy == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils
          pip install -r _system/scripts/requirements-transcripts.txt

      - name: Run full portfolio harvest
        if: steps.mode.outputs.heavy == 'true'
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
          POLYGON_EARNINGS_CACHE_MAX_AGE_HOURS: "36"
        run: python _system/scripts/download_all_holdings.py

      - name: Run light daily refresh
        if: steps.mode.outputs.heavy != 'true'
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
          POLYGON_EARNINGS_CACHE_MAX_AGE_HOURS: "36"
        run: python _system/scripts/download_all_holdings.py --light

      - name: Commit and push workspace
        run: |
          git add -A
          bash _system/scripts/ci_push_main.sh "chore: daily sync $(date -u +%Y-%m-%d)"

  marvin-refresh:
    needs: download-and-sync
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Cursor API key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "::error::CURSOR_API_KEY secret is not set."
            exit 1
          fi

      - name: Pick ticker (new documents or valuation news since last deep dive)
        id: pick
        run: |
          python _system/scripts/marvin_pick_ticker.py --json --require-new > pick.json
          cat pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cursor SDK
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        working-directory: _system/scripts
        run: npm install --no-save @cursor/sdk

      - name: Run Marvin refresh (Cloud Agent → PR)
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_STARTING_REF: main
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          TICKER: ${{ steps.pick.outputs.ticker }}
          PICK_REASON: ${{ steps.pick.outputs.reason }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node _system/scripts/marvin_deep_dive.mjs

      - name: Refresh summary
        if: always()
        run: |
          if [ "${{ steps.pick.outputs.skip }}" = "true" ]; then
            echo "No refresh — no holdings with new documents or valuation news since last deep dive."
          elif [ -n "${{ steps.pick.outputs.ticker }}" ]; then
            echo "Refresh PR started for ${{ steps.pick.outputs.ticker }} (${{ steps.pick.outputs.reason }})."
          fi
