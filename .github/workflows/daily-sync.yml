name: Daily Download & Dashboard Sync

# Downloads moved to Data Pipeline (12:00 UTC). This workflow runs Marvin
# auto-pick after a successful downloads job (or on manual dispatch).

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Data Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

concurrency:
  group: marvin-daily-refresh
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      run_marvin: ${{ steps.check.outputs.run_marvin }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_ID: ${{ github.event.workflow_run.id || '' }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run_marvin=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JOBS=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name=="downloads") | .conclusion' 2>/dev/null || true)
          if echo "$JOBS" | grep -qx success; then
            echo "run_marvin=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_marvin=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Marvin — upstream Data Pipeline did not complete downloads."
          fi

  marvin-refresh:
    needs: gate
    if: needs.gate.outputs.run_marvin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RESEARCH_VAULT_REPO_URL: ${{ secrets.RESEARCH_VAULT_REPO_URL }}
      RESEARCH_VAULT_CLONE_TOKEN: ${{ secrets.RESEARCH_VAULT_CLONE_TOKEN }}
      RESEARCH_VAULT_ROOT: _external/research-vault
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1
      - name: Checkout workspace (sparse — pick ticker metadata only)
        run: bash _system/scripts/ci_checkout_workspace.sh marvin-pick main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pick ticker (new documents or valuation news since last deep dive)
        id: pick
        run: |
          python _system/scripts/marvin_pick_ticker.py --json --require-new > pick.json
          cat pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Run Marvin refresh (Cloud Agent → PR)
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ steps.pick.outputs.ticker }}
          pick_reason: ${{ steps.pick.outputs.reason }}

      - name: Refresh summary
        if: always()
        run: |
          if [ "${{ steps.pick.outputs.skip }}" = "true" ]; then
            echo "No refresh — no holdings with new documents or valuation news since last deep dive."
          elif [ -n "${{ steps.pick.outputs.ticker }}" ]; then
            echo "Refresh PR started for ${{ steps.pick.outputs.ticker }} (${{ steps.pick.outputs.reason }})."
          fi
