name: Batch Onboard PDFs

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # All workflows that commit to main share this lock to avoid rebase races.
  group: data-commit-main
  cancel-in-progress: false

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/scripts/ci_checkout_workspace.sh
            _system/scripts/ci_resolve_checkout_ref.sh
            _system/scripts/ci_sparse_checkout_paths.py
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Checkout workspace (full)
        run: bash _system/scripts/ci_checkout_workspace.sh full

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download IR PDFs for intake tickers
        run: |
          set -euo pipefail
          TICKERS=(
            ASPN B BRBR COLD ECHO EFOR ENPH EQPT ETOR FLUX GS GTX HEI.A HL
            INV JPM LBRDK MCHB MDB POST SHC SRPT TBBK TOI WEST
          )
          for ticker in "${TICKERS[@]}"; do
            echo "=== Download $ticker ==="
            python _system/scripts/download_us_investor_docs.py --ticker "$ticker" || \
              echo "WARN: download failed for $ticker (continuing)"
          done

      - name: Commit and push PDFs
        uses: ./.github/actions/commit-main
        with:
          message: "Batch onboard: add investor PDFs for intake tickers"
          git_add: "-- ':(glob)*/investor-documents/**/*.pdf'"

      - name: Summary
        if: success()
        run: echo "Batch onboard PDF push complete."
