name: Marvin Daily Deep Dive

# Manual refresh only — daily auto-runs after download in daily-sync.yml (marvin-refresh job)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional ticker override (default: auto-pick on new documents)"
        required: false
        type: string
      force_rotate:
        description: "If no new documents, refresh oldest deep dive anyway"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: marvin-daily-deep-dive
  cancel-in-progress: false

jobs:
  deep-dive:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pick ticker (new documents since last deep dive)
        id: pick
        env:
          TICKER_OVERRIDE: ${{ github.event.inputs.ticker }}
          FORCE_ROTATE: ${{ github.event.inputs.force_rotate }}
        run: |
          if [ -n "$TICKER_OVERRIDE" ]; then
            python _system/scripts/marvin_pick_ticker.py "$TICKER_OVERRIDE" --json > pick.json
          elif [ "$FORCE_ROTATE" = "true" ]; then
            python _system/scripts/marvin_pick_ticker.py --json --force-rotate > pick.json
          else
            python _system/scripts/marvin_pick_ticker.py --json --require-new > pick.json
          fi
          cat pick.json
          TICKER=$(python -c "import json; print(json.load(open('pick.json')).get('ticker') or '')")
          SKIP=$(python -c "import json; print('true' if json.load(open('pick.json')).get('skip') else 'false')")
          REASON=$(python -c "import json; print(json.load(open('pick.json')).get('reason') or '')")
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

      - name: Run Marvin deep dive (Cloud Agent → PR)
        if: steps.pick.outputs.skip != 'true' && steps.pick.outputs.ticker != ''
        uses: ./.github/actions/marvin-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          HK_PDFS_ROOT: ${{ secrets.HK_PDFS_ROOT || '/opt/cursor/hk_pdfs' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ steps.pick.outputs.ticker }}
          pick_reason: ${{ steps.pick.outputs.reason }}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.pick.outputs.skip }}" = "true" ]; then
            echo "Skipped — no holdings with new primary documents since last deep dive."
            echo "Re-run with 'force_rotate' to refresh the oldest analysis anyway."
          elif [ -n "${{ steps.pick.outputs.ticker }}" ]; then
            echo "Refresh started for ${{ steps.pick.outputs.ticker }} (${{ steps.pick.outputs.reason }})."
          fi
