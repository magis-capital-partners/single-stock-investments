name: Marvin Daily Deep Dive

on:
  schedule:
    - cron: "0 13 * * *"  # Daily 13:00 UTC (after download sync at 12:00)
  workflow_dispatch:
    inputs:
      ticker:
        description: "Optional ticker override (default: auto-pick next holding)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: marvin-daily-deep-dive
  cancel-in-progress: false

jobs:
  deep-dive:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Cursor API key
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ -z "$CURSOR_API_KEY" ]; then
            echo "::error::CURSOR_API_KEY secret is not set."
            echo "Create at: https://cursor.com/dashboard/integrations"
            exit 1
          fi

      - name: Pick ticker
        id: pick
        env:
          TICKER_OVERRIDE: ${{ github.event.inputs.ticker }}
        run: |
          if [ -n "$TICKER_OVERRIDE" ]; then
            TICKER=$(python _system/scripts/marvin_pick_ticker.py "$TICKER_OVERRIDE")
          else
            TICKER=$(python _system/scripts/marvin_pick_ticker.py)
          fi
          echo "ticker=$TICKER" >> "$GITHUB_OUTPUT"
          echo "Marvin daily deep dive ticker: $TICKER"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cursor SDK
        working-directory: _system/scripts
        run: npm install --no-save @cursor/sdk

      - name: Run Marvin deep dive (Cloud Agent → PR)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          TICKER: ${{ steps.pick.outputs.ticker }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node _system/scripts/marvin_deep_dive.mjs

      - name: Summary
        if: success()
        run: |
          echo "Daily deep dive started for ${{ steps.pick.outputs.ticker }}."
          echo "Review and merge the PR opened by the Cursor cloud agent."
