name: Auto - Agent PR Merge

# Squash-merge Cursor cloud-agent PRs (Marvin research or Investment Committee
# task artifacts) after research-quality CI passes. Resolves shared-file
# conflicts with main before merge when needed.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: agent-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Load PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          HEAD_REF=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          IS_DRAFT=$(gh pr view "$PR" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          HEAD_SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
          if [[ ! "$HEAD_REF" =~ ^cursor/ ]]; then
            echo "PR #$PR head ref '$HEAD_REF' is not a cursor/* branch — skipping automerge."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "eligible=true" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "is_draft=$IS_DRAFT" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Mark draft PR ready (Cursor cloud agent opens drafts)
        if: steps.meta.outputs.eligible == 'true' && steps.meta.outputs.is_draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready "${{ steps.pr.outputs.number }}" \
            --repo "${{ github.repository }}"

      - name: Reload PR metadata after ready promotion
        id: meta2
        if: steps.meta.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          sleep 3
          IS_DRAFT=$(gh pr view "$PR" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          HEAD_SHA=$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::PR #$PR is still a draft after ready promotion."
            exit 1
          fi
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.meta.outputs.eligible == 'true'
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        if: steps.meta.outputs.eligible == 'true'
        with:
          python-version: "3.12"

      - name: Verify immutable agent provenance
        if: steps.meta.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ steps.meta.outputs.head_ref }}
        run: |
          mapfile -t FILES < <(gh api --paginate "repos/$REPO/pulls/$PR/files" --jq '.[].filename')
          mapfile -t RESEARCH_TICKERS < <(printf '%s\n' "${FILES[@]}" | sed -nE 's|^([^/]+)/research/research_agent_manifest\.json$|\1|p' | sort -u)
          mapfile -t COMMITTEE_FILES < <(printf '%s\n' "${FILES[@]}" | grep -E '^[^/]+/research/committee_work/' || true)

          if [ "${#RESEARCH_TICKERS[@]}" -gt 0 ]; then
            for TICKER in "${RESEARCH_TICKERS[@]}"; do
              MANIFEST="$(mktemp)"
              STATE="$(mktemp)"
              gh api "repos/$REPO/contents/$TICKER/research/research_agent_manifest.json?ref=$HEAD_REF" --jq .content | base64 --decode > "$MANIFEST"
              gh api "repos/$REPO/contents/$TICKER/research/agent_run_state.json?ref=$HEAD_REF" --jq .content | base64 --decode > "$STATE"
              python _system/scripts/validate_research_pr_provenance.py --ticker "$TICKER" --manifest "$MANIFEST" --state "$STATE"
            done
            exit 0
          fi

          if [ "${#COMMITTEE_FILES[@]}" -eq 0 ]; then
            echo "::error::Cursor agent PR must include research_agent_manifest.json or committee_work artifacts."
            exit 1
          fi

          # Workspace is the PR merge commit: main packet + this task's artifact.
          printf '%s\n' "${COMMITTEE_FILES[@]}" | python _system/scripts/validate_committee_pr_artifacts.py

      - name: Resolve merge conflicts with main
        if: steps.meta.outputs.eligible == 'true'
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          MERGEABLE=$(gh pr view "$PR" --repo "${{ github.repository }}" --json mergeable -q .mergeable)
          if [ "$MERGEABLE" = "CONFLICTING" ]; then
            python _system/scripts/resolve_marvin_pr_conflicts.py "$PR"
            echo "resolved=true" >> "$GITHUB_OUTPUT"
          else
            echo "resolved=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh head SHA
        if: steps.meta.outputs.eligible == 'true'
        id: head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --json headRefOid -q .headRefOid)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Wait for research quality checks
        if: steps.meta.outputs.eligible == 'true'
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ steps.head.outputs.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
          check-regexp: (cloud-prompt-sync|research-lint|dashboard-integrity)
          allowed-conclusions: success,skipped

      - name: Ensure mergeable before squash
        if: steps.meta.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          for attempt in 1 2 3 4 5; do
            MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q .mergeable)
            if [ "$MERGEABLE" = "MERGEABLE" ]; then
              exit 0
            fi
            if [ "$MERGEABLE" = "CONFLICTING" ]; then
              python _system/scripts/resolve_marvin_pr_conflicts.py "$PR"
              sleep 10
            else
              sleep 5
            fi
          done
          MERGEABLE=$(gh pr view "$PR" --repo "$REPO" --json mergeable -q .mergeable)
          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "::error::PR #$PR still not mergeable ($MERGEABLE) after retries."
            exit 1
          fi

      - name: Squash merge and delete branch
        if: steps.meta.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.pr.outputs.number }}"
          REPO="${{ github.repository }}"
          HEAD_REF="${{ steps.meta.outputs.head_ref }}"

          gh api --method PUT "repos/${REPO}/pulls/${PR}/merge" \
            -f merge_method=squash

          gh api --method DELETE "repos/${REPO}/git/refs/heads/${HEAD_REF}" \
            || echo "Branch ${HEAD_REF} already deleted."

      - name: Summary
        if: steps.meta.outputs.eligible == 'true'
        run: |
          echo "Merged PR #${{ steps.pr.outputs.number }} (${{ steps.meta.outputs.head_ref }}) into main."

      - name: Advance any committee task merged by this PR
        if: steps.meta.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST "repos/${{ github.repository }}/dispatches" \
            -f event_type=advance-investment-committee
