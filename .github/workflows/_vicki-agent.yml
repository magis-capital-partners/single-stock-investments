name: Vicki IR harvest agent (reusable)

on:
  workflow_call:
    inputs:
      ticker:
        required: true
        type: string

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Vicki agent
        uses: ./.github/actions/vicki-agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          ticker: ${{ inputs.ticker }}
