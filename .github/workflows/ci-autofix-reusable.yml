name: CI Autofix Reusable

on:
  workflow_call:
    inputs:
      run_id:
        required: true
        type: string
      force_agent:
        required: false
        type: string
        default: "false"
    secrets:
      CURSOR_API_KEY:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  checks: read

jobs:
  triage-and-dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout CI Autofix implementation
        uses: actions/checkout@v4
        with:
          repository: magis-capital-partners/single-stock-investments
          ref: main
          path: .ci-autofix-source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .ci-autofix-source/_system/ci_autofix/package-lock.json

      - name: Restore CI token ledger
        uses: actions/cache@v4
        with:
          path: .llm-state/ci_autofix
          key: llm-state-ci-autofix-${{ github.repository_id }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            llm-state-ci-autofix-${{ github.repository_id }}-

      - name: Install CI Autofix dependencies
        working-directory: .ci-autofix-source/_system/ci_autofix
        run: npm ci

      - name: Triage failure and dispatch Cursor if appropriate
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI_AUTOFIX_RUN_ID: ${{ inputs.run_id }}
          CI_AUTOFIX_FORCE_AGENT: ${{ inputs.force_agent }}
          LLM_LEDGER_PATH: .llm-state/ci_autofix/ledger.jsonl
          LLM_GATE_SCRIPT: .ci-autofix-source/_system/scripts/llm_call_gate.py
          LLM_POLICY_PATH: .ci-autofix-source/_system/config/llm_usage_policy.json
        run: node .ci-autofix-source/_system/ci_autofix/ci_autofix.mjs

      - name: Upload CI token audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-audit-ci-${{ github.run_id }}
          path: .llm-state/ci_autofix/ledger.jsonl
          if-no-files-found: ignore
