name: Auto - CI Repair

on:
  workflow_run:
    workflows:
      - Auto - Daily Research
      - Data Pipeline
      - Darwin Portfolio Refresh
      - Deploy OAuth Proxy (Cloudflare)
      - Auto - Research Queue
      - Research Agent Dispatcher
      - Auto - Onboard Ticker
      - Power Zone Universe
      - Auto - Investment Committee
      - Research quality (PR)
      - LLM Workflow Governance
      - Auto - IR Recovery
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: ci-autofix-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  triage-and-dispatch:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'Auto - CI Repair'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Skip fast failures
        if: github.event_name == 'workflow_run'
        id: duration
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          CREATED: ${{ github.event.workflow_run.created_at }}
          UPDATED: ${{ github.event.workflow_run.updated_at }}
        run: |
          set -euo pipefail
          # Skip autofix for failures that ended in under 5 minutes (checkout flakes, cancel races).
          python3 - <<'PY'
          import os, datetime
          created = os.environ["CREATED"].replace("Z", "+00:00")
          updated = os.environ["UPDATED"].replace("Z", "+00:00")
          c = datetime.datetime.fromisoformat(created)
          u = datetime.datetime.fromisoformat(updated)
          secs = (u - c).total_seconds()
          print(f"upstream_duration_sec={secs:.0f}")
          open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8").write(
              f"long_enough={'true' if secs >= 300 else 'false'}\n"
          )
          PY

      - name: Checkout
        if: steps.duration.outputs.long_enough == 'true'
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            _system/ci_autofix
            _system/scripts/llm_call_gate.py
            _system/config/llm_usage_policy.json
          sparse-checkout-cone-mode: false
          filter: blob:none

      - name: Restore CI token ledger
        if: steps.duration.outputs.long_enough == 'true'
        uses: actions/cache@v4
        with:
          path: .llm-state/ci_autofix
          key: llm-state-ci-autofix-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            llm-state-ci-autofix-

      - name: Set up Node.js
        if: steps.duration.outputs.long_enough == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: _system/ci_autofix/package-lock.json

      - name: Install CI Autofix dependencies
        if: steps.duration.outputs.long_enough == 'true'
        working-directory: _system/ci_autofix
        run: npm ci

      - name: Triage failure and dispatch Cursor if appropriate
        if: steps.duration.outputs.long_enough == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI_AUTOFIX_RUN_ID: ${{ github.event.workflow_run.id }}
          CI_AUTOFIX_FORCE_AGENT: "false"
          LLM_LEDGER_PATH: .llm-state/ci_autofix/ledger.jsonl
        run: node _system/ci_autofix/ci_autofix.mjs

      - name: Upload CI token audit
        if: always() && steps.duration.outputs.long_enough == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: llm-audit-ci-${{ github.run_id }}
          path: .llm-state/ci_autofix/ledger.jsonl
          if-no-files-found: ignore
          retention-days: 7

      - name: Skipped short failure
        if: github.event_name == 'workflow_run' && steps.duration.outputs.long_enough != 'true'
        run: echo "Skipping CI Autofix — upstream failure shorter than 5 minutes."
