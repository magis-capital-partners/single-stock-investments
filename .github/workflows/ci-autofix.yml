name: CI Autofix

on:
  workflow_run:
    workflows:
      - Activist Scan Sync
      - Daily Download & Dashboard Sync
      - Data Pipeline
      - Darwin Portfolio Refresh
      - Deploy OAuth Proxy (Cloudflare)
      - Drive Intake Sync
      - Marvin Deep Dive
      - Marvin Onboard Ticker
      - Portfolio News Ingest
      - Research quality (PR)
      - Vicki IR Harvest
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      run_id:
        description: "Workflow run ID to investigate"
        required: true
      force_agent:
        description: "Force Cursor agent even if classifier would normally notify only"
        required: false
        default: "false"

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  checks: read

concurrency:
  group: ci-autofix-${{ github.event.workflow_run.id || github.event.inputs.run_id }}
  cancel-in-progress: false

jobs:
  triage-and-dispatch:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'failure' &&
        github.event.workflow_run.name != 'CI Autofix'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Skip fast failures
        if: github.event_name == 'workflow_run'
        id: duration
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          CREATED: ${{ github.event.workflow_run.created_at }}
          UPDATED: ${{ github.event.workflow_run.updated_at }}
        run: |
          set -euo pipefail
          # Skip autofix for failures that ended in under 5 minutes (checkout flakes, cancel races).
          python3 - <<'PY'
          import os, datetime
          created = os.environ["CREATED"].replace("Z", "+00:00")
          updated = os.environ["UPDATED"].replace("Z", "+00:00")
          c = datetime.datetime.fromisoformat(created)
          u = datetime.datetime.fromisoformat(updated)
          secs = (u - c).total_seconds()
          print(f"upstream_duration_sec={secs:.0f}")
          open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8").write(
              f"long_enough={'true' if secs >= 300 else 'false'}\n"
          )
          PY

      - name: Checkout
        if: github.event_name == 'workflow_dispatch' || steps.duration.outputs.long_enough == 'true'
        uses: actions/checkout@v4
        with:
          sparse-checkout: _system/ci_autofix
          sparse-checkout-cone-mode: true
          filter: blob:none

      - name: Set up Node.js
        if: github.event_name == 'workflow_dispatch' || steps.duration.outputs.long_enough == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: _system/ci_autofix/package-lock.json

      - name: Install CI Autofix dependencies
        if: github.event_name == 'workflow_dispatch' || steps.duration.outputs.long_enough == 'true'
        working-directory: _system/ci_autofix
        run: npm ci

      - name: Triage failure and dispatch Cursor if appropriate
        if: github.event_name == 'workflow_dispatch' || steps.duration.outputs.long_enough == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CI_AUTOFIX_RUN_ID: ${{ github.event.inputs.run_id || github.event.workflow_run.id }}
          CI_AUTOFIX_FORCE_AGENT: ${{ github.event.inputs.force_agent || 'false' }}
        run: node _system/ci_autofix/ci_autofix.mjs

      - name: Skipped short failure
        if: github.event_name == 'workflow_run' && steps.duration.outputs.long_enough != 'true'
        run: echo "Skipping CI Autofix — upstream failure shorter than 5 minutes."
