name: Drive Intake Sync

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:
    inputs:
      kind:
        description: "Optional intake kind: vic, research, or company"
        required: false
        type: string
      limit:
        description: "Optional max files to import"
        required: false
        default: "0"
        type: string

permissions:
  contents: write

concurrency:
  group: drive-intake-sync
  cancel-in-progress: false

jobs:
  import-drive-intake:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Google credentials secret
        id: google_creds
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            MSG="GOOGLE_APPLICATION_CREDENTIALS_JSON is not configured in Settings → Secrets and variables → Actions."
            DOC="See README.md and _system/reference/document-store/drive_intake_readme.md."
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::${MSG} ${DOC}"
              exit 1
            fi
            echo "::warning::Skipping Drive Intake Sync — ${MSG} ${DOC}"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.google_creds.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.google_creds.outputs.configured == 'true'
        run: pip install -r _system/scripts/requirements.txt

      - name: Configure Google credentials
        if: steps.google_creds.outputs.configured == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

      - name: Import Drive intake PDFs
        if: steps.google_creds.outputs.configured == 'true'
        env:
          KIND: ${{ github.event.inputs.kind || '' }}
          LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: |
          ARGS="--ensure-folders"
          if [ -n "$KIND" ]; then ARGS="$ARGS --kind $KIND"; fi
          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          python _system/scripts/import_drive_intake.py $ARGS

      - name: Activist scan (SEC + publishers)
        if: steps.google_creds.outputs.configured == 'true'
        run: |
          python _system/scripts/scan_activist_sources.py --sec-only || true
          python _system/scripts/short_scan_batch.py

      - name: Rebuild document registry and dashboard data
        if: steps.google_creds.outputs.configured == 'true'
        run: |
          python _system/scripts/build_document_registry.py
          python _system/scripts/audit_drive_pdf_store.py
          python _system/scripts/build_drive_filename_index.py
          python _system/scripts/build_letter_drive_links.py
          python _system/scripts/sync_pdf_store_google_drive.py --root-key general_pdfs --workers 4
          python _system/scripts/build_document_registry.py
          python _system/scripts/build_drive_filename_index.py
          python _system/scripts/build_letter_drive_links.py
          python _system/scripts/build_insights.py
          python _system/scripts/build_research_memory.py
          python _system/scripts/build_activist_feed.py
          python _system/scripts/build_dashboard_data.py
        env:
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          OAUTH_PROXY_URL: ${{ vars.OAUTH_PROXY_URL }}

      - name: Mirror dashboard to docs
        if: steps.google_creds.outputs.configured == 'true'
        shell: bash
        run: |
          rsync -a --delete --exclude '.git' --exclude '.wrangler' dashboard/ docs/

      - name: Commit imported documents
        if: steps.google_creds.outputs.configured == 'true'
        run: |
          git add -A
          bash _system/scripts/ci_push_main.sh "chore: sync Drive intake documents $(date -u +%Y-%m-%d)"
