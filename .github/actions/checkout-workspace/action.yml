name: Checkout workspace
description: >-
  Free runner disk and checkout repo with profile-specific sparse paths.
  Uses only public actions before checkout — never nest ./.github/actions/* here.

inputs:
  profile:
    description: full | history | news | marvin-pick | marvin-agent | darwin | dashboard | minimal
    required: false
    default: full
  ref:
    description: Git ref to checkout (empty = default ref for the workflow)
    required: false
    default: ""
  fetch-depth:
    description: Override fetch depth (empty = 1, or 0 for history profile)
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Public action only — local ./.github/actions/* cannot run before checkout.
    - uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        docker-images: true
        swap-storage: true

    - name: Resolve checkout settings
      id: cfg
      shell: bash
      run: |
        PROFILE="${{ inputs.profile }}"
        DEPTH="${{ inputs.fetch-depth }}"
        if [ -z "$DEPTH" ]; then
          if [ "$PROFILE" = "history" ]; then
            DEPTH=0
          else
            DEPTH=1
          fi
        fi
        echo "depth=$DEPTH" >> "$GITHUB_OUTPUT"
        echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"

    - name: Checkout (full)
      if: inputs.profile == 'full' || inputs.profile == 'history'
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ steps.cfg.outputs.depth }}

    - name: Checkout (minimal)
      if: inputs.profile == 'minimal' || inputs.profile == 'marvin-agent'
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ steps.cfg.outputs.depth }}
        filter: blob:none
        sparse-checkout: |
          _system
          .github
        sparse-checkout-cone-mode: false

    - name: Checkout (sparse base)
      if: contains(fromJSON('["news","marvin-pick","darwin","dashboard"]'), inputs.profile)
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: ${{ steps.cfg.outputs.depth }}
        filter: blob:none
        sparse-checkout: |
          _system
          .github
          dashboard
          docs
        sparse-checkout-cone-mode: false

    - name: Expand sparse checkout
      if: contains(fromJSON('["news","marvin-pick","darwin","dashboard"]'), inputs.profile)
      shell: bash
      run: |
        set -euo pipefail
        PROFILE="${{ steps.cfg.outputs.profile }}"
        ADDED=0
        while IFS= read -r path; do
          [ -z "$path" ] && continue
          git sparse-checkout add "$path"
          ADDED=$((ADDED + 1))
        done < <(python3 _system/scripts/ci_sparse_checkout_paths.py "$PROFILE")
        echo "Sparse profile=$PROFILE added_paths=$ADDED"
        git read-tree -mu HEAD
