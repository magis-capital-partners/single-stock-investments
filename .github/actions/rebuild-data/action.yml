name: Rebuild dashboard data
description: Run build_dashboard_data pipeline by profile (same job, shared workspace)

inputs:
  profile:
    description: full|intake-full|activist|darwin|darwin-full|insights|pages-fast|minimal|none
    required: true
  mirror_docs:
    description: Mirror dashboard/ to docs/ after rebuild
    required: false
    default: "false"
  validate:
    description: Run validate_dashboard_data.py
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout research vault (when configured)
      if: env.RESEARCH_VAULT_CLONE_TOKEN != '' && inputs.profile != 'none'
      uses: ./.github/actions/checkout-vault

    - name: Install Darwin dependencies
      if: contains(inputs.profile, 'darwin')
      shell: bash
      run: pip install -r _system/scripts/requirements-darwin.txt

    - name: Install base dependencies
      if: >
        inputs.profile == 'intake-full' ||
        inputs.profile == 'full' ||
        inputs.profile == 'activist' ||
        inputs.profile == 'pages-fast' ||
        inputs.profile == 'insights' ||
        inputs.profile == 'minimal' ||
        contains(inputs.profile, 'darwin')
      shell: bash
      run: pip install -r _system/scripts/requirements.txt

    - name: Configure Google credentials (full profile)
      if: inputs.profile == 'full' || inputs.profile == 'intake-full'
      shell: bash
      env:
        GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ env.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      run: |
        if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON}" ]; then
          echo "::error::GOOGLE_APPLICATION_CREDENTIALS_JSON is required for profile ${{ inputs.profile }}."
          echo "::error::The full rebuild runs Drive audit/sync scripts that need the pdf-store service account."
          exit 1
        fi
        printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/google-service-account.json"
        echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/google-service-account.json" >> "$GITHUB_ENV"

    - name: Rebuild profile
      if: inputs.profile != 'none'
      shell: bash
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      run: python _system/scripts/ci_rebuild_profile.py "${{ inputs.profile }}"

    - name: Mirror dashboard to docs
      if: inputs.mirror_docs == 'true'
      shell: bash
      run: rsync -a --delete --exclude '.git' --exclude '.wrangler' dashboard/ docs/

    - name: Validate dashboard JSON
      if: inputs.validate == 'true'
      shell: bash
      run: |
        python -m unittest _system/scripts/test_event_materiality.py _system/scripts/test_event_triage.py
        python _system/scripts/validate_dashboard_data.py
