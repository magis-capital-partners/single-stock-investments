name: Rebuild dashboard data
description: Run build_dashboard_data pipeline by profile (same job, shared workspace)

inputs:
  profile:
    description: intake-full | activist | darwin-full | darwin-fast
    required: true
  mirror_docs:
    description: Mirror dashboard/ to docs/ after rebuild
    required: false
    default: "false"
  validate:
    description: Run validate_dashboard_data.py
    required: false
    default: "false"
  vault_checkout:
    description: Clone research-vault before rebuild (activist-only profiles skip vault)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Checkout research vault (when configured)
      if: inputs.vault_checkout == 'true' && env.RESEARCH_VAULT_CLONE_TOKEN != ''
      uses: ./.github/actions/checkout-vault

    - name: Install Darwin dependencies
      if: contains(inputs.profile, 'darwin')
      shell: bash
      run: pip install -r _system/scripts/requirements-darwin.txt

    - name: Install base dependencies
      if: inputs.profile == 'intake-full' || inputs.profile == 'activist'
      shell: bash
      run: pip install -r _system/scripts/requirements.txt

    - name: Rebuild (intake-full)
      if: inputs.profile == 'intake-full'
      shell: bash
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      run: |
        python _system/scripts/build_document_registry.py
        python _system/scripts/audit_drive_pdf_store.py
        python _system/scripts/build_drive_filename_index.py
        python _system/scripts/build_letter_drive_links.py
        python _system/scripts/sync_pdf_store_google_drive.py --root-key general_pdfs --workers 4
        python _system/scripts/build_document_registry.py
        python _system/scripts/build_drive_filename_index.py
        python _system/scripts/build_letter_drive_links.py
        python _system/scripts/build_fundamental_series.py
        python _system/scripts/fetch_insider_transactions.py --offline
        python _system/scripts/build_equity_model_dashboard.py
        python _system/scripts/extract_equity_kpi_observations.py
        python _system/scripts/build_kpi_trends.py
        python _system/scripts/build_insights.py
        python _system/scripts/build_research_memory.py
        python _system/scripts/build_power_zones.py
        python _system/scripts/clean_activist_indexes.py
        python _system/scripts/cleanup_activist_false_positives.py
        python _system/scripts/activist_triage.py --apply --fetch-sec
        python _system/scripts/build_activist_feed.py
        python _system/scripts/auto_resolve_filing_events.py
        python _system/scripts/build_dashboard_data.py

    - name: Rebuild (activist)
      if: inputs.profile == 'activist'
      shell: bash
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      run: |
        python _system/scripts/build_document_registry.py
        python _system/scripts/clean_activist_indexes.py
        python _system/scripts/cleanup_activist_false_positives.py
        python _system/scripts/activist_triage.py --apply --fetch-sec
        python _system/scripts/build_activist_feed.py
        python _system/scripts/auto_resolve_filing_events.py
        python _system/scripts/build_dashboard_data.py

    - name: Rebuild (darwin-full)
      if: inputs.profile == 'darwin-full'
      shell: bash
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      run: |
        python _system/scripts/download_ira_research.py --tier A
        python _system/scripts/download_ira_research.py --tier B
        python _system/scripts/build_darwin_portfolio.py
        python _system/scripts/build_dashboard_data.py

    - name: Rebuild (darwin-fast)
      if: inputs.profile == 'darwin-fast'
      shell: bash
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      run: |
        python _system/scripts/download_ira_research.py --tier A || true
        python _system/scripts/build_darwin_portfolio.py --fast
        python _system/scripts/build_nol_screener.py --write
        python _system/scripts/build_fundamental_series.py
        python _system/scripts/fetch_insider_transactions.py --offline
        python _system/scripts/build_equity_model_dashboard.py
        python _system/scripts/extract_equity_kpi_observations.py
        python _system/scripts/build_kpi_trends.py
        python _system/scripts/build_power_zones.py
        python _system/scripts/clean_activist_feed.py
        python _system/scripts/build_insights.py
        python _system/scripts/build_dashboard_data.py
        rsync -a --delete --exclude '.git' --exclude '.wrangler' dashboard/ docs/

    - name: Mirror dashboard to docs
      if: inputs.mirror_docs == 'true'
      shell: bash
      run: rsync -a --delete --exclude '.git' --exclude '.wrangler' dashboard/ docs/

    - name: Validate dashboard JSON
      if: inputs.validate == 'true'
      shell: bash
      run: python _system/scripts/validate_dashboard_data.py
