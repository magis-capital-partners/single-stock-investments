name: Checkout research vault
description: Clone private magis-capital-partners/research-vault into RESEARCH_VAULT_ROOT

inputs:
  vault_ref:
    description: Git ref for vault repo (default main)
    required: false
    default: main

runs:
  using: composite
  steps:
    - name: Validate vault clone token
      shell: bash
      run: |
        if [ -z "${{ env.RESEARCH_VAULT_CLONE_TOKEN }}" ]; then
          echo "::error::RESEARCH_VAULT_CLONE_TOKEN is required."
          echo "::error::Public single-stock-investments cannot use GITHUB_TOKEN to read private research-vault."
          echo "::error::Add a fine-grained PAT with Contents: Read on magis-capital-partners/research-vault."
          exit 1
        fi

    - name: Clone research vault
      uses: actions/checkout@v4
      with:
        repository: magis-capital-partners/research-vault
        ref: ${{ inputs.vault_ref }}
        path: _external/research-vault
        token: ${{ env.RESEARCH_VAULT_CLONE_TOKEN }}
        fetch-depth: 1

    - name: Export RESEARCH_VAULT_ROOT
      shell: bash
      run: |
        root="${RESEARCH_VAULT_ROOT:-_external/research-vault}"
        echo "RESEARCH_VAULT_ROOT=$root" >> "$GITHUB_ENV"
        python3 - <<'PY' || true
        import json, os, sys
        sys.path.insert(0, "_system/scripts")
        os.environ["RESEARCH_VAULT_ROOT"] = os.environ.get("RESEARCH_VAULT_ROOT", "_external/research-vault")
        from vault_paths import vault_status
        status = vault_status()
        print(json.dumps(status, indent=2))
        if not status.get("letters_exists"):
            print("::warning::superinvestor-letters missing in cloned research-vault")
        PY
