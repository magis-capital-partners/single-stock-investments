name: Commit and push to main
description: Stage changes and push to main with rebase retry (ci_push_main.sh)

inputs:
  message:
    description: Commit message
    required: true
  git_add:
    description: Arguments to git add
    required: false
    default: "-A"

runs:
  using: composite
  steps:
    - name: Stage and push
      shell: bash
      run: |
        # Prefer a deepenable history over depth=1 so rebase onto a moving main
        # still has a merge-base (letter-backfill publish failure mode).
        if git rev-parse --is-shallow-repository 2>/dev/null | grep -qx true; then
          git fetch --deepen=200 origin main 2>/dev/null || git fetch origin main
        else
          git fetch origin main
        fi
        # --sparse allows staging paths written on disk that sit outside a
        # sparse-checkout cone (e.g. dashboard/data after a minimal checkout).
        git add --sparse ${{ inputs.git_add }}
        bash _system/scripts/ci_push_main.sh "${{ inputs.message }}"

    - name: Deploy chain note
      shell: bash
      run: |
        echo "Committed to main. Deploy Dashboard (GitHub Pages) will chain via workflow_run."
