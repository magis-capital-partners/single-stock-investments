name: Marvin cloud agent
description: Run Marvin deep dive via Cursor Cloud Agent

inputs:
  ticker:
    description: Ticker symbol
    required: true
  pick_reason:
    description: Optional reason string for the agent
    required: false
    default: ""
  evidence_hash:
    description: Stable hash of the changed research evidence
    required: true
  evidence_manifest:
    description: Path to the small evidence manifest
    required: true
  evidence_manifest_json:
    description: Compact manifest content embedded in the constrained prompt
    required: true
  force:
    description: Explicit manual override of duplicate/cooldown gates
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Admit research judgment call
      id: llm_gate
      uses: ./.github/actions/llm-gate
      with:
        consumer: marvin_research
        subject: ${{ inputs.ticker }}
        reason: ${{ inputs.pick_reason }}
        evidence_hash: ${{ inputs.evidence_hash }}
        state_file: ${{ inputs.ticker }}/research/agent_run_state.json
        force: ${{ inputs.force }}

    - name: Check Cursor API key
      if: steps.llm_gate.outputs.approved == 'true'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ env.CURSOR_API_KEY }}
      run: |
        if [ -z "$CURSOR_API_KEY" ]; then
          echo "::error::CURSOR_API_KEY secret is not set."
          echo "Create at: https://cursor.com/dashboard/cloud-agents"
          exit 1
        fi

    - name: Checkout research vault (optional)
      if: steps.llm_gate.outputs.approved == 'true' && env.RESEARCH_VAULT_CLONE_TOKEN != ''
      uses: ./.github/actions/checkout-vault
    - name: Set HK vault path from research vault
      if: steps.llm_gate.outputs.approved == 'true' && env.RESEARCH_VAULT_CLONE_TOKEN != ''
      shell: bash
      run: |
        HK="${RESEARCH_VAULT_ROOT:-_external/research-vault}/investment-wisdom/horizon-kinetics/pdfs"
        if [ -d "$HK" ]; then
          echo "HK_PDFS_ROOT=$HK" >> "$GITHUB_ENV"
        fi

    - name: Set up Node.js
      if: steps.llm_gate.outputs.approved == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: _system/scripts/package-lock.json

    - name: Install Cursor SDK
      if: steps.llm_gate.outputs.approved == 'true'
      shell: bash
      working-directory: _system/scripts
      run: npm ci --ignore-scripts

    - name: Resolve model from ladder
      id: model
      if: steps.llm_gate.outputs.approved == 'true'
      shell: bash
      run: |
        python _system/scripts/llm_call_gate.py model \
          --consumer marvin_research --reason "${{ inputs.pick_reason }}"

    - name: Run Marvin deep dive
      id: agent
      if: steps.llm_gate.outputs.approved == 'true'
      shell: bash
      env:
        CURSOR_API_KEY: ${{ env.CURSOR_API_KEY }}
        CURSOR_MODEL_ID: ${{ steps.model.outputs.model }}
        HK_PDFS_ROOT: ${{ env.HK_PDFS_ROOT }}
        TICKER: ${{ inputs.ticker }}
        PICK_REASON: ${{ inputs.pick_reason }}
        RESEARCH_EVIDENCE_HASH: ${{ inputs.evidence_hash }}
        RESEARCH_EVIDENCE_MANIFEST: ${{ inputs.evidence_manifest }}
        RESEARCH_EVIDENCE_MANIFEST_JSON: ${{ inputs.evidence_manifest_json }}
        GITHUB_REPOSITORY: ${{ env.GITHUB_REPOSITORY }}
      run: node _system/scripts/marvin_deep_dive.mjs

    - name: Record research call outcome
      if: always() && steps.llm_gate.outputs.approved == 'true'
      shell: bash
      env:
        STATUS: ${{ steps.agent.outcome == 'success' && 'completed' || 'failed' }}
      run: |
        python _system/scripts/llm_call_gate.py record \
          --consumer marvin_research --subject "${{ inputs.ticker }}" \
          --reason "${{ inputs.pick_reason }}" --evidence-hash "${{ inputs.evidence_hash }}" \
          --ledger "${{ steps.llm_gate.outputs.ledger }}" --status "$STATUS"

    - name: Upload research call audit
      if: always() && steps.llm_gate.outputs.approved == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: llm-audit-marvin-${{ inputs.ticker }}-${{ github.run_id }}
        path: ${{ steps.llm_gate.outputs.ledger }}
        if-no-files-found: ignore

    - name: Summary
      shell: bash
      run: |
        if [ "${{ steps.llm_gate.outputs.approved }}" = "true" ]; then
          echo "Marvin research agent finished for ${{ inputs.ticker }}."
        else
          echo "No Cursor call for ${{ inputs.ticker }}: ${{ steps.llm_gate.outputs.gate_reason }}."
        fi
