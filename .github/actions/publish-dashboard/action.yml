name: Publish dashboard
description: Rebuild dashboard JSON and upload GitHub Pages artifact

inputs:
  skip_rebuild:
    description: Skip rebuild (deploy committed dashboard/ as-is)
    required: false
    default: "false"
  skip_deploy:
    description: Upload artifact only (deploy in a separate job)
    required: false
    default: "false"
  rebuild_profile:
    description: rebuild-data profile when skip_rebuild=false (pages-fast recommended)
    required: false
    default: "pages-fast"
  validate:
    description: Run validate_dashboard_data.py after rebuild or on deploy-only
    required: false
    default: "true"

outputs:
  page_url:
    description: Deployed GitHub Pages URL (empty when skip_deploy=true)
    value: ${{ steps.deployment.outputs.page_url }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.skip_rebuild != 'true' || inputs.validate == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install validation dependencies
      if: inputs.skip_rebuild == 'true' && inputs.validate == 'true'
      shell: bash
      run: pip install -r _system/scripts/requirements.txt

    - name: Rebuild and validate
      if: inputs.skip_rebuild != 'true'
      uses: ./.github/actions/rebuild-data
      env:
        OAUTH_CLIENT_ID: ${{ env.OAUTH_CLIENT_ID }}
        OAUTH_PROXY_URL: ${{ env.OAUTH_PROXY_URL }}
      with:
        profile: ${{ inputs.rebuild_profile }}
        validate: ${{ inputs.validate }}

    - name: Validate committed dashboard JSON
      if: inputs.skip_rebuild == 'true' && inputs.validate == 'true'
      shell: bash
      env:
        CI_PAGES_DEPLOY_ONLY: "true"
      run: |
        python -m unittest _system/scripts/test_event_materiality.py _system/scripts/test_event_triage.py _system/scripts/test_validate_dashboard_pages_deploy.py
        python _system/scripts/validate_dashboard_data.py

    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: dashboard

    - name: Deploy to GitHub Pages
      if: inputs.skip_deploy != 'true'
      id: deployment
      uses: ./.github/actions/deploy-pages-retry
      with:
        max_attempts: "3"
        retry_delay_seconds: "60"

    - name: Summary
      shell: bash
      run: |
        if [ "${{ inputs.skip_deploy }}" = "true" ]; then
          echo "Pages artifact uploaded; deploy job will publish."
        else
          echo "Dashboard live at ${{ steps.deployment.outputs.page_url }}"
          echo "Verify data/oauth_config.json exchange_url matches OAUTH_PROXY_URL repo variable."
        fi
